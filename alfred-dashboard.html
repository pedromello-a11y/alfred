<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Alfred</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a25;
  --b1:#ffffff08;--b2:#ffffff12;--b3:#ffffff18;
  --t1:#e8e8ed;--t2:#8888a0;--t3:#555568;
  --green:#4ade80;--green-bg:#4ade8015;--green-dim:#2a4a2a;
  --purple:#7c5cbf;--purple-light:#a78bfa;--purple-bg:#7c5cbf18;
  --red:#ef4444;--red-bg:#ef444415;
  --warn:#f59e0b;--warn-bg:#f59e0b15;
  --blue:#60a5fa;--blue-bg:#60a5fa15;
  --radius:8px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;overflow:hidden}

/* Tab bar */
.tabbar{display:flex;align-items:center;height:40px;border-bottom:1px solid var(--b1);padding:0 20px;gap:2px;flex-shrink:0;background:var(--bg)}
.tab{padding:0 14px;height:40px;display:flex;align-items:center;cursor:pointer;color:var(--t3);font-size:11px;font-weight:600;letter-spacing:.1em;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--t1);border-bottom-color:var(--green)}
.tab-end{margin-left:auto;display:flex;align-items:center;gap:12px}
.clock{font-family:monospace;font-size:11px;color:var(--t3)}

/* App structure */
.app{display:flex;flex-direction:column;height:100vh}
.view{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.view.on{display:flex}

/* ── FOCO layout ── */
.foco-layout{display:flex;flex:1;overflow:hidden;min-height:0}
.foco-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 80px;position:relative;min-width:0}
.foco-sidebar{flex:0 0 300px;border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}

.focus-project{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--green);font-family:monospace;margin-bottom:6px}
.focus-deliverable{font-size:13px;color:var(--t3);margin-bottom:12px}
.focus-title{font-size:clamp(40px,7vw,80px);font-weight:800;letter-spacing:-.04em;color:var(--t1);text-align:center;max-width:750px;line-height:1.0;word-wrap:break-word;cursor:pointer}
.focus-title:hover{color:#fff}
.timer-bar-wrap{margin-top:20px;width:320px}
.timer-bar-bg{height:6px;background:var(--b2);border-radius:3px;overflow:hidden}
.timer-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width 1s linear,background .3s}
.timer-label{font-size:12px;color:var(--t3);font-family:monospace;margin-top:6px;text-align:center}
.focus-window{font-size:12px;color:var(--t3);font-family:monospace;margin-top:4px;text-align:center}
.focus-deadline-real{font-size:11px;color:var(--t3);opacity:.5;font-family:monospace;margin-top:2px;text-align:center}
.focus-actions{display:flex;gap:8px;margin-top:28px;opacity:.2;transition:opacity .2s}
.focus-actions:hover{opacity:1}
.btn{padding:7px 16px;border-radius:6px;border:1px solid var(--b2);background:var(--s1);color:var(--t1);font-size:12px;cursor:pointer;transition:background .15s,border-color .15s;font-family:inherit}
.btn:hover{background:var(--s2);border-color:var(--b3)}
.btn-green{border-color:#4ade8030;color:var(--green)}.btn-green:hover{background:var(--green-bg)}
.btn-red{border-color:#ef444430;color:var(--red)}.btn-red:hover{background:var(--red-bg)}

/* Checklist */
.checklist-wrap{width:100%;max-width:480px;margin-top:24px}
.cl-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--b1)}
.cl-item input[type=checkbox]{accent-color:var(--green);width:14px;height:14px;cursor:pointer}
.cl-item label{font-size:13px;color:var(--t2);cursor:pointer;flex:1}
.cl-item input[type=checkbox]:checked+label{text-decoration:line-through;color:var(--t3)}

/* Day timeline sidebar */
.day-tl{flex:1;overflow-y:auto;padding:8px 12px}
.tl-item{display:flex;gap:8px;align-items:flex-start;padding:5px 6px;border-radius:5px;margin-bottom:2px;cursor:pointer}
.tl-item:hover{background:var(--b1)}
.tl-item.current{background:#4ade8010;border-left:2px solid var(--green)}
.tl-time{font-family:monospace;font-size:10px;color:var(--t3);width:36px;flex-shrink:0;padding-top:1px}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tl-dot.gcal{background:var(--purple-light)}
.tl-dot.fixed{background:var(--warn)}
.tl-dot.auto{background:var(--green);opacity:.6}
.tl-dot.done{background:var(--t3)}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-sub{font-size:10px;color:var(--t3);font-family:monospace}
.day-summary-box{padding:10px 14px;border-top:1px solid var(--b1);font-size:11px;color:var(--t3);font-family:monospace;flex-shrink:0}

/* ── AGENDA layout ── */
.agenda-layout{display:flex;flex:1;overflow:hidden;min-height:0}
.agenda-grid-wrap{flex:1;overflow:auto;position:relative}
.agenda-sidebar{flex:0 0 280px;border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}

/* Agenda header */
.agenda-header{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--b1);flex-shrink:0}
.week-nav-btn{background:none;border:1px solid var(--b2);border-radius:4px;color:var(--t2);font-size:11px;padding:4px 10px;cursor:pointer;font-family:monospace}
.week-nav-btn:hover{border-color:var(--b3);color:var(--t1)}
.week-label{flex:1;text-align:center;font-size:12px;color:var(--t3);font-family:monospace}

/* Grid semanal */
.week-grid{display:grid;min-width:1100px}
.week-grid-header{display:grid;grid-column:1/-1;border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:5;background:var(--bg)}
.grid-time-col{width:52px;flex-shrink:0}
.day-col{flex:1;min-width:0;border-right:1px solid var(--b1);position:relative}
.day-col.weekend{max-width:120px;background:#ffffff02}
.day-header{padding:8px 10px 6px;text-align:center;border-bottom:1px solid var(--b1)}
.day-name{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;font-family:monospace;letter-spacing:.08em}
.day-date{font-size:10px;color:var(--t3);font-family:monospace;margin-top:1px}
.day-header.today .day-name{color:var(--green)}
.day-header.today .day-date{color:var(--green);opacity:.7}
.day-footer{padding:5px 8px;text-align:center;border-top:1px solid var(--b1);font-size:10px;color:var(--t3);font-family:monospace;background:var(--bg)}
.day-footer.over{color:var(--red)}

/* Grid rows */
.grid-body{display:flex;position:relative}
.time-col{width:52px;flex-shrink:0;position:relative}
.time-label{position:absolute;right:8px;font-size:9px;color:var(--t3);font-family:monospace;transform:translateY(-50%);white-space:nowrap}
.grid-cols{display:flex;flex:1;position:relative}
.day-slots{flex:1;min-width:0;position:relative;border-right:1px solid var(--b1)}
.day-slots.weekend{max-width:120px;background:#ffffff02}
.hour-line{position:absolute;left:0;right:0;height:1px;background:var(--b1);pointer-events:none}
.half-line{position:absolute;left:0;right:0;height:1px;background:#ffffff04;pointer-events:none}

/* Blocks */
.blk{position:absolute;left:2px;right:2px;border-radius:5px;overflow:hidden;font-size:11px;transition:opacity .2s}
.blk-gcal{background:#2d1b69;border:2px solid var(--purple);color:#c4b5e3;cursor:default}
.blk-fixed{border:1px solid;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.blk-fixed:active{cursor:grabbing}
.blk-fixed.meal{background:#1a2a1a;border-color:#2a4a2a;color:#7aab7a}
.blk-fixed.exercise{background:#1a1a2d;border-color:#2a2a5a;color:#7a7ab0}
.blk-fixed.pet{background:#2d1a2d;border-color:#5a2a5a;color:#b07ab0}
.blk-fixed.home{background:#2d2a1a;border-color:#5a4a2a;color:#b0a07a}
.blk-fixed.other{background:#1a1a1a;border-color:#333;color:#8888a0}
.blk-auto{background:#0d1f0d;border:1px dashed var(--green-dim);color:#7aab7a;cursor:pointer}
.blk-auto:hover{background:#0f250f}
.blk-inner{padding:3px 6px;height:100%;display:flex;flex-direction:column;justify-content:flex-start}
.blk-title{font-size:10px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.blk-sub{font-size:9px;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blk-est{font-size:9px;opacity:.4;font-family:monospace}
.blk-margin{position:absolute;left:0;right:0;bottom:0;background:rgba(74,222,128,.08);border-top:1px dashed #4ade8030;pointer-events:none}
.blk-delete{position:absolute;top:2px;right:2px;width:14px;height:14px;background:var(--red);color:#fff;border-radius:50%;font-size:8px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:10;line-height:1}
.blk-fixed:hover .blk-delete{display:flex}
.blk-resize-handle{position:absolute;bottom:0;left:0;right:0;height:6px;cursor:ns-resize;background:transparent}
.blk-resize-handle:hover{background:rgba(255,255,255,.15)}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:4;pointer-events:none}
.now-dot{position:absolute;left:-4px;top:-4px;width:10px;height:10px;background:var(--red);border-radius:50%}
.drop-target-active{background:#ffffff08 !important}
.slot-empty-hover{position:absolute;left:0;right:0;background:transparent;cursor:pointer}
.slot-empty-hover:hover{background:#ffffff06}

/* Sidebar agenda */
.aside-tabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0}
.aside-tab{flex:1;padding:8px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:monospace}
.aside-tab:hover{color:var(--t2)}
.aside-tab.on{color:var(--t1);border-bottom-color:var(--green)}
.aside-content{flex:1;overflow-y:auto;padding:8px}
.aside-label{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;font-family:monospace;padding:6px 4px 4px;margin-top:4px}
.queue-item{padding:7px 8px;border:1px solid var(--b1);border-radius:5px;margin-bottom:4px;cursor:pointer;transition:border-color .15s;user-select:none}
.queue-item:hover{border-color:var(--b3)}
.queue-item[draggable=true]{cursor:grab}
.qi-name{font-size:12px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qi-project{font-size:10px;color:var(--t3);font-family:monospace;margin-top:1px}
.qi-meta{display:flex;gap:6px;align-items:center;margin-top:3px;font-size:10px;color:var(--t3);font-family:monospace}
.qi-prog{flex:1;height:3px;background:var(--b2);border-radius:2px;overflow:hidden;margin-top:4px}
.qi-prog-fill{height:100%;background:var(--green);border-radius:2px}
.qi-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.qi-active{background:var(--green)}
.qi-holding{background:var(--warn)}
.qi-backlog{background:var(--t3)}
.block-preset{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--b1);border-radius:5px;margin-bottom:4px;cursor:grab;transition:border-color .15s;user-select:none}
.block-preset:hover{border-color:var(--b3)}
.block-preset:active{cursor:grabbing;opacity:.7}
.week-summary-box{padding:10px 12px;border-top:1px solid var(--b1);flex-shrink:0;font-size:11px;color:var(--t3);font-family:monospace}
.completion-row{font-size:10px;color:var(--t3);font-family:monospace;padding:1px 0;display:flex;gap:4px;align-items:center}
.completion-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* Inline block create popup */
.slot-popup{position:absolute;background:var(--s2);border:1px solid var(--b3);border-radius:8px;padding:12px;z-index:200;width:200px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.slot-popup input,.slot-popup select{width:100%;background:var(--bg);color:var(--t1);border:1px solid var(--b2);border-radius:4px;padding:5px 8px;font-size:12px;margin-bottom:6px;outline:none;font-family:inherit}
.slot-popup-types{display:flex;gap:4px;margin-bottom:8px}
.type-btn{flex:1;padding:4px;border-radius:4px;border:1px solid var(--b2);background:transparent;color:var(--t3);font-size:13px;cursor:pointer;transition:border-color .15s}
.type-btn:hover,.type-btn.on{border-color:var(--green);color:var(--t1)}
.slot-popup-actions{display:flex;gap:6px}
.slot-popup-actions button{flex:1;padding:5px;border-radius:4px;border:1px solid var(--b2);background:var(--s1);color:var(--t1);font-size:11px;cursor:pointer;font-family:monospace}
.slot-popup-actions button:first-child{border-color:#4ade8030;color:var(--green)}

/* ── DEMANDAS ── */
.demandas-layout{flex:1;padding:20px 28px;overflow-y:auto}
.demandas-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-shrink:0}
.demandas-title{font-size:18px;font-weight:700;color:var(--t1)}
.search-input{background:var(--s1);color:var(--t1);border:1px solid var(--b2);border-radius:6px;padding:7px 12px;font-size:13px;outline:none;font-family:inherit}
.search-input:focus{border-color:var(--b3)}
.filter-chips{display:flex;gap:4px}
.fchip{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:600;color:var(--t3);border:1px solid var(--b2);cursor:pointer;transition:all .15s;font-family:monospace;letter-spacing:.06em}
.fchip:hover{border-color:var(--b3);color:var(--t2)}
.fchip.on{border-color:var(--green);color:var(--green);background:var(--green-bg)}

/* Tree */
.tree-node{margin-bottom:2px}
.tree-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;cursor:pointer;transition:background .15s}
.tree-row:hover{background:var(--b1)}
.tree-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t3);flex-shrink:0;transition:transform .15s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-icon{font-size:10px;color:var(--t3);width:10px;flex-shrink:0}
.tree-name{flex:1;font-size:13px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-name.project{color:var(--t1);font-weight:600}
.tree-name.deliverable{color:var(--t1)}
.tree-dl{font-size:10px;font-family:monospace;color:var(--t3)}
.tree-est{font-size:10px;font-family:monospace;color:var(--t3)}
.tree-children{padding-left:20px}
.s-active{color:var(--green)}
.s-holding{color:var(--warn)}
.s-backlog{color:var(--t3)}
.s-done{color:var(--t3);opacity:.4}

/* ── PESSOAL ── */
.personal-layout{flex:1;padding:20px 28px;overflow-y:auto;max-width:700px;margin:0 auto;width:100%}
.pi-item{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--b1);transition:background .15s;user-select:none}
.pi-item:hover{background:var(--b1)}
.pi-item.dragging{opacity:.4}
.pi-item.drag-over{border-top:2px solid var(--green)}
.pi-handle{color:var(--t3);font-size:12px;cursor:grab;padding:0 4px;flex-shrink:0}
.pi-handle:active{cursor:grabbing}
.pi-check{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.pi-text{flex:1;font-size:14px;color:var(--t1);outline:none;background:transparent;border:none;cursor:pointer;font-family:inherit;padding:0}
.pi-text.done{text-decoration:line-through;color:var(--t3)}
.pi-text:focus{cursor:text;border-bottom:1px solid var(--b3)}
.pi-del{font-size:11px;color:var(--t3);cursor:pointer;opacity:0;transition:opacity .15s;padding:2px 6px;border-radius:4px}
.pi-item:hover .pi-del{opacity:.7}
.pi-del:hover{opacity:1;color:var(--red)}

/* ── Bottom quick-add bar ── */
.quick-bar{border-top:1px solid var(--b1);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg)}
.quick-input{flex:1;background:var(--s1);color:var(--t1);border:1px solid var(--b2);border-radius:6px;padding:8px 14px;font-size:13px;outline:none;font-family:inherit}
.quick-input:focus{border-color:var(--b3)}
.quick-deadline{background:var(--s1);color:var(--t2);border:1px solid var(--b2);border-radius:6px;padding:8px 10px;font-size:12px;font-family:monospace;outline:none;cursor:pointer;width:96px}
.quick-est{background:var(--s1);color:var(--t2);border:1px solid var(--b2);border-radius:6px;padding:8px 10px;font-size:12px;font-family:monospace;outline:none;width:72px}
.quick-btn{padding:8px 14px;border-radius:6px;border:1px solid #4ade8030;background:transparent;color:var(--green);font-size:12px;cursor:pointer;font-family:monospace;transition:background .15s}
.quick-btn:hover{background:var(--green-bg)}
.quick-more{padding:8px 10px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t3);font-size:12px;cursor:pointer;font-family:monospace}
.quick-more:hover{color:var(--t2)}

/* Autocomplete */
.autocomplete{position:absolute;bottom:100%;left:0;right:0;background:var(--s2);border:1px solid var(--b3);border-radius:6px;max-height:200px;overflow-y:auto;z-index:500;margin-bottom:4px;display:none}
.autocomplete.show{display:block}
.ac-item{padding:7px 12px;cursor:pointer;font-size:12px;color:var(--t2)}
.ac-item:hover{background:var(--b1);color:var(--t1)}
.ac-item-sub{font-size:10px;color:var(--t3);font-family:monospace;margin-top:1px}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:#00000080;z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:10px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:28px;position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;line-height:1;padding:4px}
.modal-close:hover{color:var(--t1)}
.modal-title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:22px}
.field-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;font-family:monospace;display:block;margin-bottom:4px}
.field-input{width:100%;background:var(--bg);color:var(--t1);border:1px solid var(--b2);border-radius:6px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;margin-bottom:14px}
.field-input:focus{border-color:var(--b3)}
select.field-input{cursor:pointer}
.field-hint{font-size:10px;color:var(--t3);font-family:monospace;margin-top:-10px;margin-bottom:10px}
.field-row{display:flex;gap:10px}
.field-row>.field-group{flex:1}
.field-group label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;font-family:monospace;display:block;margin-bottom:4px}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--b1)}
.status-btns{display:flex;gap:4px}
.sbtn{padding:5px 12px;border-radius:5px;border:1px solid var(--b2);background:transparent;color:var(--t3);font-size:11px;cursor:pointer;font-family:monospace;transition:all .15s}
.sbtn:hover{border-color:var(--b3);color:var(--t2)}
.sbtn.on.active{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.sbtn.on.on_holding{border-color:var(--warn);color:var(--warn);background:var(--warn-bg)}
.sbtn.on.backlog{border-color:var(--t3);color:var(--t2);background:var(--b1)}
.modal-checklist{margin-bottom:14px}
.cl-add{display:flex;gap:6px;margin-top:6px}
.cl-add input{flex:1;background:var(--bg);color:var(--t1);border:1px solid var(--b2);border-radius:4px;padding:5px 10px;font-size:12px;outline:none;font-family:inherit}
.cl-add button{padding:5px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:4px;color:var(--t2);cursor:pointer;font-size:11px}
.cl-add button:hover{border-color:var(--b3);color:var(--t1)}
.jira-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--blue-bg);border:1px solid #60a5fa30;border-radius:4px;font-size:11px;color:var(--blue);font-family:monospace;cursor:pointer;text-decoration:none}
.holding-section{background:var(--warn-bg);border:1px solid #f59e0b20;border-radius:6px;padding:10px 12px;margin-bottom:14px}

/* Toast */
.toast{position:fixed;bottom:60px;right:20px;background:var(--s2);border:1px solid var(--b2);padding:9px 16px;border-radius:6px;font-size:12px;z-index:9999;transition:opacity .3s;pointer-events:none;font-family:monospace}
.toast.err{border-color:#ef444430;color:var(--red)}
.toast.ok{border-color:#4ade8030;color:var(--green)}

/* Shimmer */
@keyframes shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
.shimmer{background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%);background-size:1000px 100%;animation:shimmer 1.5s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.pls{animation:pls 1.5s ease-in-out infinite}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* Shake */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.shake{animation:shake .3s ease}
</style>
</head>
<body>
<div class="app">

<!-- Tab bar -->
<div class="tabbar">
  <div class="tab on" data-tab="foco" onclick="switchTab('foco')">FOCO</div>
  <div class="tab" data-tab="agenda" onclick="switchTab('agenda')">AGENDA</div>
  <div class="tab" data-tab="demandas" onclick="switchTab('demandas')">DEMANDAS</div>
  <div class="tab" data-tab="pessoal" onclick="switchTab('pessoal')">PESSOAL</div>
  <div class="tab-end">
    <span class="clock" id="clock"></span>
  </div>
</div>

<!-- ── FOCO ── -->
<div class="view on" id="view-foco">
  <div class="foco-layout">
    <div class="foco-main" id="foco-main">
      <div id="urgent-dot" style="display:none;margin-bottom:16px;"><span class="pls" style="display:inline-block;width:10px;height:10px;background:var(--red);border-radius:50%;vertical-align:middle;"></span><span style="font-size:11px;color:var(--red);font-family:monospace;margin-left:6px;letter-spacing:.08em;">ENTREGA URGENTE</span></div>
      <div class="focus-project" id="f-project"></div>
      <div class="focus-deliverable" id="f-deliverable"></div>
      <div class="focus-title" id="f-title" onclick="focoTitleClick()">—</div>
      <div class="timer-bar-wrap">
        <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-fill" style="width:100%"></div></div>
        <div class="timer-label" id="timer-label"></div>
      </div>
      <div class="focus-window" id="f-window"></div>
      <div class="focus-deadline-real" id="f-deadline"></div>
      <div class="focus-actions" id="foco-actions">
        <button class="btn btn-green" onclick="completeTask()">✓ entregar</button>
        <div style="position:relative">
          <button class="btn" id="pause-btn" onclick="togglePauseMenu()">☕ pausa ▾</button>
          <div id="pause-menu" style="display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--s2);border:1px solid var(--b2);border-radius:6px;overflow:hidden;min-width:110px;z-index:100">
            <div onclick="insertPause(15)" style="padding:7px 14px;cursor:pointer;font-size:12px;color:var(--t2);font-family:monospace" onmouseenter="this.style.background='var(--b1)'" onmouseleave="this.style.background=''">15 min</div>
            <div onclick="insertPause(30)" style="padding:7px 14px;cursor:pointer;font-size:12px;color:var(--t2);font-family:monospace" onmouseenter="this.style.background='var(--b1)'" onmouseleave="this.style.background=''">30 min</div>
            <div onclick="insertPause(60)" style="padding:7px 14px;cursor:pointer;font-size:12px;color:var(--t2);font-family:monospace" onmouseenter="this.style.background='var(--b1)'" onmouseleave="this.style.background=''">1 hora</div>
          </div>
        </div>
        <button class="btn" onclick="enterTunnel()">◼ túnel</button>
      </div>
      <div id="foco-checklist" class="checklist-wrap"></div>
    </div>
    <div class="foco-sidebar">
      <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);font-family:monospace;padding:12px 14px 6px;flex-shrink:0">SEU DIA</div>
      <div class="day-tl" id="day-tl"></div>
      <div class="day-summary-box" id="day-summary-box"></div>
    </div>
  </div>
  <!-- quick bar -->
  <div class="quick-bar">
    <div style="position:relative;flex:1;display:flex;gap:8px;align-items:center">
      <input class="quick-input" id="q-input" placeholder="nova demanda... (ou Projeto | Tarefa)" oninput="onQuickInput()" onkeydown="onQuickKey(event)" autocomplete="off" />
      <div class="autocomplete" id="q-autocomplete"></div>
    </div>
    <input class="quick-deadline" id="q-deadline" type="date" title="prazo" />
    <input class="quick-est" id="q-est" placeholder="2h30" title="estimativa" />
    <button class="quick-btn" onclick="quickCreate()">+ criar</button>
    <button class="quick-more" onclick="openCreateModal()">+ opções</button>
  </div>
</div>

<!-- ── AGENDA ── -->
<div class="view" id="view-agenda">
  <div class="agenda-header">
    <button class="week-nav-btn" onclick="agendaWeek(-1)">← anterior</button>
    <span class="week-label" id="week-label">—</span>
    <button class="week-nav-btn" onclick="agendaWeek(0)">hoje</button>
    <button class="week-nav-btn" onclick="agendaWeek(1)">próxima →</button>
    <button class="week-nav-btn" style="border-color:#4ade8030;color:var(--green)" onclick="seedDemo()">seed demo</button>
  </div>
  <div class="agenda-layout">
    <div class="agenda-grid-wrap" id="agenda-grid-wrap">
      <div id="week-grid-container"></div>
    </div>
    <div class="agenda-sidebar">
      <div class="aside-tabs">
        <div class="aside-tab on" data-stab="demandas" onclick="switchAsideTab('demandas')">DEMANDAS</div>
        <div class="aside-tab" data-stab="blocos" onclick="switchAsideTab('blocos')">BLOCOS</div>
        <div class="aside-tab" data-stab="pessoal" onclick="switchAsideTab('pessoal')">PESSOAL</div>
      </div>
      <div class="aside-content" id="aside-content"></div>
      <div class="week-summary-box" id="week-summary-box"></div>
    </div>
  </div>
</div>

<!-- ── DEMANDAS ── -->
<div class="view" id="view-demandas">
  <div class="demandas-layout">
    <div class="demandas-header">
      <span class="demandas-title">DEMANDAS</span>
      <input class="search-input" id="dem-search" placeholder="🔍 buscar..." oninput="filterTree()" style="width:220px" />
      <div class="filter-chips">
        <span class="fchip on" data-f="all" onclick="setDemFilter('all',this)">todas</span>
        <span class="fchip" data-f="active" onclick="setDemFilter('active',this)">● ativas</span>
        <span class="fchip" data-f="on_holding" onclick="setDemFilter('on_holding',this)">◑ holding</span>
        <span class="fchip" data-f="backlog" onclick="setDemFilter('backlog',this)">○ backlog</span>
      </div>
      <button class="btn btn-green" onclick="openCreateModal()" style="margin-left:auto">+ nova</button>
    </div>
    <div id="dem-tree"></div>
  </div>
  <div class="quick-bar">
    <div style="position:relative;flex:1;display:flex;gap:8px;align-items:center">
      <input class="quick-input" id="qd-input" placeholder="nova demanda..." oninput="onQuickInputD()" onkeydown="onQuickKeyD(event)" autocomplete="off" />
      <div class="autocomplete" id="qd-autocomplete"></div>
    </div>
    <input class="quick-deadline" id="qd-deadline" type="date" title="prazo" />
    <input class="quick-est" id="qd-est" placeholder="2h30" title="estimativa" />
    <button class="quick-btn" onclick="quickCreateD()">+ criar</button>
    <button class="quick-more" onclick="openCreateModal()">+ opções</button>
  </div>
</div>

<!-- ── PESSOAL ── -->
<div class="view" id="view-pessoal">
  <div class="personal-layout">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <span style="font-size:18px;font-weight:700;color:var(--t1)">PESSOAL</span>
      <input class="search-input" id="pi-search" placeholder="🔍 buscar..." oninput="filterPersonal()" style="width:200px" />
      <div style="display:flex;gap:6px;margin-left:auto">
        <input class="search-input" id="pi-new" placeholder="novo item..." onkeydown="if(event.key==='Enter')addPersonalItem()" style="width:180px" />
        <button class="btn btn-green" onclick="addPersonalItem()">+ add</button>
      </div>
    </div>
    <div id="pi-list"></div>
    <details id="pi-done-section" style="margin-top:20px">
      <summary style="font-size:11px;color:var(--t3);font-family:monospace;cursor:pointer;padding:4px 0">▸ concluídos</summary>
      <div id="pi-done-list" style="margin-top:8px;opacity:.5"></div>
    </details>
  </div>
</div>

<!-- ── Modal task ── -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-heading">Tarefa</div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── Modal create ── -->
<div class="modal-overlay" id="create-overlay" onclick="if(event.target===this)closeCreateModal()">
  <div class="modal" id="create-box">
    <button class="modal-close" onclick="closeCreateModal()">✕</button>
    <div class="modal-title">Nova demanda</div>
    <div id="create-body"></div>
  </div>
</div>

</div><!-- /app -->

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
var API = '';
var currentTab = 'foco';
var currentWeekStart = null; // ISO date string of Monday
var agendaData = null;       // last loaded agenda-v2 payload
var stateData = null;        // last loaded /state payload
var projectsCache = [];      // [{id,name,type,parentName}]
var personalCache = [];      // [{id,title,position,done,...}]
var allTasksCache = null;    // {active:[],onHolding:[],backlog:[]}
var treeCache = null;        // tree from /projects
var currentModalTaskId = null;
var asideTab = 'demandas';
var demFilter = 'all';
var focoTimerInterval = null;
var focoWindowEnd = null; // Date when current window ends
var focoEstMins = 0;
var focoWindowMins = 0;
var dragData = {};
var resizing = null;
var slotPopupEl = null;

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(focoTimerTick, 1000);
  initWeek();
  Promise.all([
    loadState(),
    loadProjectsCache(),
  ]).then(function() {
    renderFoco();
  });
});

function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  var el = document.getElementById('clock');
  if (el) el.textContent = h+':'+m+':'+s;
}

function initWeek() {
  var today = new Date();
  var dow = today.getDay();
  var diff = (dow === 0) ? -6 : 1 - dow;
  var mon = new Date(today);
  mon.setDate(today.getDate() + diff);
  currentWeekStart = mon.toISOString().slice(0,10);
}

// ─────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(el) {
    el.classList.toggle('on', el.dataset.tab === tab);
  });
  document.querySelectorAll('.view').forEach(function(el) {
    el.classList.toggle('on', el.id === 'view-' + tab);
  });
  if (tab === 'agenda') loadAgenda();
  if (tab === 'demandas') loadDemandas();
  if (tab === 'pessoal') loadPersonal();
}

// ─────────────────────────────────────────────
// API
// ─────────────────────────────────────────────
async function api(path, opts) {
  try {
    var r = await fetch(API + path, opts || {});
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) {
    showToast('Erro: ' + e.message, 'err');
    return null;
  }
}
async function GET(path) { return api(path); }
async function POST(path, body) {
  return api(path, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
}
async function PUT(path, body) {
  return api(path, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
}
async function DEL(path) { return api(path, {method:'DELETE'}); }

function showToast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.style.opacity='0'; setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},300); }, 2500);
}

// ─────────────────────────────────────────────
// STATE LOAD
// ─────────────────────────────────────────────
async function loadState() {
  var data = await GET('/dashboard/state');
  if (!data) return;
  stateData = data;
}

async function loadProjectsCache() {
  var data = await GET('/dashboard/project-suggestions?q=');
  if (data && Array.isArray(data)) {
    projectsCache = data;
  }
  // Also load full tree
  var tree = await GET('/dashboard/projects');
  if (tree) treeCache = tree;
}

// ─────────────────────────────────────────────
// FOCO
// ─────────────────────────────────────────────
function renderFoco() {
  if (!stateData) return;
  var focus = stateData.focus || {};
  var today = stateData.today || [];
  var agenda = stateData.agenda || {};

  // Project / deliverable / title
  var parts = (focus.fullTitle || focus.taskName || '').split('|').map(function(s){return s.trim();});
  var projEl = document.getElementById('f-project');
  var delivEl = document.getElementById('f-deliverable');
  var titleEl = document.getElementById('f-title');

  if (parts.length >= 3) {
    if(projEl) projEl.textContent = parts[0];
    if(delivEl) delivEl.textContent = parts[1];
    if(titleEl) titleEl.textContent = parts[2];
  } else if (parts.length === 2) {
    if(projEl) projEl.textContent = parts[0];
    if(delivEl) delivEl.textContent = '';
    if(titleEl) titleEl.textContent = parts[1];
  } else {
    if(projEl) projEl.textContent = '';
    if(delivEl) delivEl.textContent = '';
    if(titleEl) titleEl.textContent = parts[0] || '—';
  }

  // Urgent dot
  var urgentEl = document.getElementById('urgent-dot');
  if (urgentEl) urgentEl.style.display = (focus.status === 'urgent') ? '' : 'none';

  // Timer: use window or estimate
  focoEstMins = focus.estimate || 120;
  focoWindowMins = focoEstMins; // will be set from agenda block if available
  var cb = focus.currentBlock;
  if (cb && cb.remainingMinutes !== undefined) {
    focoWindowMins = cb.remainingMinutes;
    var windowEndDate = new Date();
    windowEndDate.setMinutes(windowEndDate.getMinutes() + cb.remainingMinutes);
    focoWindowEnd = windowEndDate;
    var endStr = cb.end || '';
    var winEl = document.getElementById('f-window');
    if(winEl) winEl.textContent = endStr ? '⏱ janela até ' + endStr + ' (' + cb.elapsedMinutes + 'min decorridos)' : '';
  } else {
    focoWindowEnd = null;
    var winEl = document.getElementById('f-window');
    if(winEl) winEl.textContent = '';
  }

  // Deadline
  var dlEl = document.getElementById('f-deadline');
  if (dlEl) {
    if (focus.deadlineHuman && focus.deadlineHuman !== 'sem prazo') {
      dlEl.textContent = '📅 prazo real: ' + focus.deadlineHuman;
    } else {
      dlEl.textContent = '';
    }
  }

  focoTimerTick();

  // Checklist
  renderFocoChecklist(focus);

  // Day timeline
  renderDayTimeline(today, agenda);
}

function focoTitleClick() {
  if (stateData && stateData.focus && stateData.focus.taskId) {
    openTaskModal(stateData.focus.taskId);
  }
}

function focoTimerTick() {
  var fill = document.getElementById('timer-fill');
  var label = document.getElementById('timer-label');
  if (!fill || !label) return;

  if (focoWindowEnd) {
    var now = new Date();
    var remaining = Math.max(0, (focoWindowEnd - now) / 60000);
    var totalMins = focoWindowMins || focoEstMins || 120;
    var pct = Math.min(100, remaining / totalMins * 100);
    fill.style.width = pct + '%';

    var rh = Math.floor(remaining / 60);
    var rm = Math.floor(remaining % 60);
    label.textContent = (rh > 0 ? rh + 'h' : '') + rm + 'min restam';

    if (remaining <= 5) {
      fill.style.background = 'var(--red)';
      if (remaining <= 0) fill.style.animation = 'pls 1s infinite';
    } else if (remaining <= 15) {
      fill.style.background = 'var(--warn)';
    } else {
      fill.style.background = 'var(--green)';
      fill.style.animation = '';
    }
  } else {
    fill.style.width = '60%';
    fill.style.background = 'var(--green)';
    label.textContent = focoEstMins ? (Math.floor(focoEstMins/60) + 'h' + (focoEstMins%60 ? String(focoEstMins%60).padStart(2,'0')+'min' : '') + ' estimado') : '';
  }
}

function renderFocoChecklist(focus) {
  var wrap = document.getElementById('foco-checklist');
  if (!wrap) return;
  if (!focus.taskId || !focus.checklistTotal) { wrap.innerHTML=''; return; }
  // Fetch checklist from task detail
  GET('/dashboard/task/' + focus.taskId).then(function(task) {
    if (!task || !task.checklist || !task.checklist.length) { wrap.innerHTML=''; return; }
    var html = '<div style="font-size:10px;color:var(--t3);font-family:monospace;margin-bottom:6px;letter-spacing:.08em">CHECKLIST</div>';
    task.checklist.forEach(function(item, idx) {
      var cid = 'cl-' + idx;
      html += '<div class="cl-item"><input type="checkbox" id="'+cid+'" '+(item.done?'checked':'')+' onchange="toggleChecklist(\''+focus.taskId+'\','+idx+',this.checked)">';
      html += '<label for="'+cid+'">'+esc(item.text)+'</label></div>';
    });
    wrap.innerHTML = html;
  });
}

async function toggleChecklist(taskId, idx, done) {
  await POST('/dashboard/task/' + taskId + '/checklist', {action:'toggle', index:idx});
}

function renderDayTimeline(todayItems, agenda) {
  var wrap = document.getElementById('day-tl');
  var summary = document.getElementById('day-summary-box');
  if (!wrap) return;

  var now = new Date();
  var nowH = now.getHours();
  var nowM = now.getMinutes();

  var items = [];

  // Today tasks
  (todayItems || []).forEach(function(t) {
    items.push({
      time: t.scheduledStart || t.deadline ? (t.scheduledStart || t.deadline.slice(11,16)) : '—',
      title: t.taskName || t.title || '',
      sub: t.project ? t.project : '',
      type: (t.status === 'done' || t.status === 'completed') ? 'done' : 'auto',
      id: t.id,
    });
  });

  // Agenda gcal/fixed blocks for today
  var today = new Date();
  var todayISO = today.toISOString().slice(0,10);
  var dow = today.getDay();
  var dayIdx = (dow === 0) ? 6 : dow - 1;

  if (agenda && agenda.days) {
    var dayData = agenda.days[dayIdx] || {};
    (dayData.events || []).forEach(function(ev) {
      items.push({time: ev.start || ev.time || '', title: ev.title, sub: ev.type, type: ev.source === 'gcal' ? 'gcal' : 'fixed', id: null});
    });
    (agenda.suggestedBlocks || []).forEach(function(b) {
      if (b.day === dayIdx) {
        items.push({time: b.start || b.time || '', title: b.title, sub: b.project || '', type: 'auto', id: b.taskId});
      }
    });
  }

  items.sort(function(a,b) { return (a.time || '99:99').localeCompare(b.time || '99:99'); });

  var html = '';
  items.forEach(function(item) {
    var timeParts = (item.time || '').split(':');
    var ih = parseInt(timeParts[0]) || 0;
    var im = parseInt(timeParts[1]) || 0;
    var isCurrent = (ih === nowH || (ih === nowH - 1 && im >= nowM));
    html += '<div class="tl-item'+(isCurrent?' current':'')+'" onclick="'+(item.id?'openTaskModal(\''+item.id+'\')':'')+'">';
    html += '<span class="tl-time">'+esc(item.time)+'</span>';
    html += '<div class="tl-dot '+item.type+'"></div>';
    html += '<div class="tl-body"><div class="tl-title">'+esc(item.title)+'</div>';
    if (item.sub) html += '<div class="tl-sub">'+esc(item.sub)+'</div>';
    html += '</div></div>';
  });
  if (!items.length) html = '<div style="padding:20px;text-align:center;color:var(--t3);font-size:11px;font-family:monospace">dia livre</div>';
  wrap.innerHTML = html;

  if (summary && stateData) {
    var est = (stateData.focus && stateData.focus.estimate) ? stateData.focus.estimate : 0;
    var h = Math.floor(est/60), m = est%60;
    var fac = (stateData.deficit && stateData.deficit.totalAvailable && stateData.deficit.totalNeeded) ?
      Math.min(2.5, stateData.deficit.totalAvailable / Math.max(stateData.deficit.totalNeeded, 0.1)) : 1.5;
    summary.innerHTML = (est ? (h+'h'+(m?String(m).padStart(2,'0')+'min':'')+' est · ') : '') + factorEmoji(fac) + ' fator ' + fac.toFixed(1) + 'x';
  }
}

function factorEmoji(f) {
  if (f < 1.0) return '😰';
  if (f <= 1.3) return '😐';
  if (f <= 1.7) return '🙂';
  if (f <= 2.5) return '😌';
  return '😎';
}

async function completeTask() {
  if (!stateData || !stateData.focus || !stateData.focus.taskId) { showToast('Nenhuma task em foco', 'err'); return; }
  var tid = stateData.focus.taskId;
  var r = await POST('/dashboard/task/' + tid + '/complete', {});
  if (r && r.status === 'ok') {
    showToast('✓ ' + (r.title || 'tarefa concluída'), 'ok');
    stateData = null;
    var data = await GET('/dashboard/state');
    if (data) { stateData = data; renderFoco(); }
  }
}

async function insertPause(mins) {
  document.getElementById('pause-menu').style.display = 'none';
  await POST('/dashboard/pause', {duration_minutes: mins});
  showToast('Pausa de ' + mins + 'min inserida', 'ok');
}

function togglePauseMenu() {
  var m = document.getElementById('pause-menu');
  m.style.display = (m.style.display === 'none' ? '' : 'none');
}

function enterTunnel() {
  document.querySelector('.tabbar').style.display = 'none';
  document.querySelector('.quick-bar') && (document.querySelector('.quick-bar').style.display = 'none');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var tb = document.querySelector('.tabbar');
    if (tb) tb.style.display = '';
    var qb = document.querySelector('.quick-bar');
    if (qb) qb.style.display = '';
    closeModal();
    closeCreateModal();
    if (slotPopupEl) { slotPopupEl.remove(); slotPopupEl = null; }
  }
});

// ─────────────────────────────────────────────
// AGENDA
// ─────────────────────────────────────────────
function agendaWeek(delta) {
  if (delta === 0) { initWeek(); }
  else {
    var d = new Date(currentWeekStart);
    d.setDate(d.getDate() + delta * 7);
    currentWeekStart = d.toISOString().slice(0,10);
  }
  loadAgenda();
}

async function loadAgenda() {
  var lbl = document.getElementById('week-label');
  if (lbl) lbl.textContent = 'carregando…';
  var data = await GET('/dashboard/agenda-v2?week=' + currentWeekStart);
  if (!data) return;
  agendaData = data;
  renderWeekGrid(data);
  renderWeekSummary(data.summary);
  renderAsideTasks();
  var endDate = new Date(currentWeekStart);
  endDate.setDate(endDate.getDate() + 4);
  if (lbl) lbl.textContent = fmtDate(new Date(currentWeekStart)) + ' – ' + fmtDate(endDate);
}

function fmtDate(d) {
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

// ─────────────────────────────────────────────
// WEEK GRID RENDER
// ─────────────────────────────────────────────
var HOUR_H = 60; // px per hour
var GRID_START = 8; // 08:00
var GRID_END = 19;  // 19:00

function timeToY(timeStr) {
  var parts = (timeStr || '08:00').split(':');
  var h = parseInt(parts[0]) || 0;
  var m = parseInt(parts[1]) || 0;
  return ((h - GRID_START) * 60 + m) / 60 * HOUR_H;
}

function minsToPx(mins) { return mins / 60 * HOUR_H; }

function renderWeekGrid(data) {
  var container = document.getElementById('week-grid-container');
  if (!container) return;
  var today = new Date().toISOString().slice(0,10);
  var totalH = (GRID_END - GRID_START) * HOUR_H;

  var html = '<div style="display:flex;min-width:900px">';
  // Time axis
  html += '<div class="grid-time-col" style="padding-top:48px;position:relative;height:'+(totalH+48)+'px">';
  for (var h = GRID_START; h <= GRID_END; h++) {
    var y = (h - GRID_START) * HOUR_H;
    html += '<div class="time-label" style="top:'+(y+48)+'px">'+String(h).padStart(2,'0')+':00</div>';
  }
  html += '</div>';

  // Day columns
  (data.days || []).forEach(function(day, di) {
    var isWeekend = day.is_weekend;
    var isToday = (day.date === today);
    var colW = isWeekend ? '90px' : '1fr';
    var dayName = day.day_name;
    var dayDateStr = day.date ? fmtDate(new Date(day.date + 'T12:00:00')) : '';
    var factorStr = day.factor ? day.factor.toFixed(1) + 'x ' + (day.factor_emoji || '') : '';
    var isOver = day.factor < 1.0;

    html += '<div style="'+(isWeekend?'width:90px':'flex:1')+';min-width:'+(isWeekend?'90':'148')+'px;display:flex;flex-direction:column;border-right:1px solid var(--b1)">';
    // Day header
    html += '<div class="day-header'+(isToday?' today':'')+'" style="height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:1px solid var(--b1)">';
    html += '<div class="day-name">'+dayName+'</div>';
    html += '<div class="day-date">'+dayDateStr+'</div>';
    html += '</div>';
    // Slots area
    html += '<div id="day-col-'+di+'" class="day-slots'+(isWeekend?' weekend':'')+'" style="position:relative;height:'+totalH+'px;width:100%" data-day="'+di+'" data-date="'+day.date+'">';
    // Hour lines
    for (var hh = GRID_START; hh <= GRID_END; hh++) {
      var yy = (hh - GRID_START) * HOUR_H;
      html += '<div class="hour-line" style="top:'+yy+'px"></div>';
      if (hh < GRID_END) html += '<div class="half-line" style="top:'+(yy+HOUR_H/2)+'px"></div>';
    }
    html += '</div>';
    // Footer
    html += '<div class="day-footer'+(isOver?' over':'')+'">';
    if (!isWeekend) {
      html += day.estimated_hours + 'h / ' + day.available_hours + 'h · ' + factorStr;
    }
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;

  // Now add blocks (they need DOM)
  (data.days || []).forEach(function(day, di) {
    var colEl = document.getElementById('day-col-' + di);
    if (!colEl) return;
    // Drop events
    colEl.addEventListener('dragover', function(e) {
      e.preventDefault();
      colEl.classList.add('drop-target-active');
    });
    colEl.addEventListener('dragleave', function(e) {
      if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('drop-target-active');
    });
    colEl.addEventListener('drop', function(e) {
      e.preventDefault();
      colEl.classList.remove('drop-target-active');
      handleDrop(e, di, day.date);
    });
    colEl.addEventListener('click', function(e) {
      if (e.target === colEl || e.target.classList.contains('hour-line') || e.target.classList.contains('half-line')) {
        var rect = colEl.getBoundingClientRect();
        var relY = e.clientY - rect.top;
        var mins = Math.floor(relY / HOUR_H * 60);
        var snapMins = Math.round(mins / 15) * 15;
        var h = GRID_START + Math.floor(snapMins / 60);
        var m = snapMins % 60;
        var startStr = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
        showSlotPopup(e, di, day.date, startStr);
      }
    });

    // Render blocks
    (day.blocks || []).forEach(function(block) {
      renderGridBlock(colEl, block, di, day.date);
    });
  });

  // Now line
  renderNowLine(data.days || []);
}

function renderGridBlock(colEl, block, dayIdx, dayDate) {
  var top = timeToY(block.start);
  var endTop = timeToY(block.end);
  var height = Math.max(endTop - top, 18);

  var el = document.createElement('div');
  el.className = 'blk';
  el.style.top = top + 'px';
  el.style.height = height + 'px';

  if (block.type === 'gcal') {
    el.classList.add('blk-gcal');
    el.innerHTML = '<div class="blk-inner"><div class="blk-title">'+esc(block.title)+'</div><div class="blk-sub">'+esc(block.start)+' – '+esc(block.end)+'</div></div>';
    el.title = block.title + '\n' + block.start + ' – ' + block.end;
  } else if (block.type === 'fixed') {
    el.classList.add('blk-fixed');
    el.classList.add(block.block_type || 'other');
    el.draggable = true;
    el.dataset.blockId = block.block_id;
    el.innerHTML = '<div class="blk-inner"><div class="blk-title">'+esc(block.title)+'</div><div class="blk-sub">'+esc(block.start)+' – '+esc(block.end)+'</div></div>';
    // Delete btn
    var delBtn = document.createElement('div');
    delBtn.className = 'blk-delete';
    delBtn.textContent = '✕';
    delBtn.onclick = function(e) { e.stopPropagation(); deleteScheduleBlock(block.block_id); };
    el.appendChild(delBtn);
    // Resize handle
    var handle = document.createElement('div');
    handle.className = 'blk-resize-handle';
    handle.addEventListener('mousedown', function(e) { e.stopPropagation(); startBlockResize(e, el, block, dayIdx, dayDate); });
    el.appendChild(handle);
    // Drag
    el.addEventListener('dragstart', function(e) {
      dragData = {type:'fixed-block', blockId:block.block_id, title:block.title, blockType:block.block_type, duration: Math.round((timeToY(block.end) - timeToY(block.start)) / HOUR_H * 60)};
      e.dataTransfer.setData('text/plain', 'fixed-block');
      setTimeout(function(){el.style.opacity='0.4';},0);
    });
    el.addEventListener('dragend', function() { el.style.opacity='1'; });
  } else if (block.type === 'auto') {
    el.classList.add('blk-auto');
    var marginH = block.margin_minutes ? minsToPx(block.margin_minutes) : 0;
    var estH = height - marginH;
    var contLabel = block.is_continuation ? ' <span style="opacity:.5">(cont.)</span>' : '';
    el.innerHTML = '<div class="blk-inner"><div class="blk-title">'+esc(block.title)+contLabel+'</div>';
    if (block.project) el.innerHTML += '<div class="blk-sub">'+esc(block.project)+'</div>';
    el.innerHTML += '<div class="blk-est">est '+block.estimated_minutes+'min</div></div>';
    if (marginH > 4) {
      var marginDiv = document.createElement('div');
      marginDiv.className = 'blk-margin';
      marginDiv.style.height = marginH + 'px';
      el.appendChild(marginDiv);
    }
    el.addEventListener('click', function() { if (block.task_id) openTaskModal(block.task_id); });
    el.title = block.title + (block.project ? '\n' + block.project : '') + '\nest: ' + block.estimated_minutes + 'min\njanela: ' + block.window_minutes + 'min';
  }

  // Handle overlaps
  resolveOverlap(colEl, el, top, height);
  colEl.appendChild(el);
}

function resolveOverlap(colEl, el, top, height) {
  var existing = Array.from(colEl.querySelectorAll('.blk'));
  var overlap = existing.filter(function(ex) {
    var et = parseFloat(ex.style.top) || 0;
    var eh = parseFloat(ex.style.height) || 0;
    return !(top >= et + eh || top + height <= et);
  });
  if (overlap.length > 0) {
    var w = 100 / (overlap.length + 1);
    overlap.forEach(function(ex, i) {
      ex.style.left = (i * w) + '%';
      ex.style.right = '';
      ex.style.width = w + '%';
    });
    el.style.left = (overlap.length * w) + '%';
    el.style.right = '';
    el.style.width = w + '%';
  }
}

function renderNowLine(days) {
  var today = new Date().toISOString().slice(0,10);
  var dayIdx = -1;
  days.forEach(function(d, i) { if (d.date === today) dayIdx = i; });
  if (dayIdx < 0) return;
  var colEl = document.getElementById('day-col-' + dayIdx);
  if (!colEl) return;
  var now = new Date();
  var timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  var y = timeToY(timeStr);
  if (y < 0 || y > (GRID_END - GRID_START) * HOUR_H) return;
  var line = document.createElement('div');
  line.className = 'now-line';
  line.style.top = y + 'px';
  var dot = document.createElement('div');
  dot.className = 'now-dot';
  line.appendChild(dot);
  colEl.appendChild(line);
}

// ─────────────────────────────────────────────
// DRAG AND DROP
// ─────────────────────────────────────────────
function handleDrop(e, dayIdx, dayDate) {
  var rect = e.currentTarget.getBoundingClientRect();
  var relY = e.clientY - rect.top;
  var mins = Math.floor(relY / HOUR_H * 60);
  var snapMins = Math.round(mins / 15) * 15;
  var h = GRID_START + Math.floor(snapMins / 60);
  var m = snapMins % 60;
  var startStr = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');

  var dt = e.dataTransfer;
  var dtype = dt.getData('text/plain');

  if (dtype === 'task-drag') {
    var taskId = dt.getData('taskId');
    var estimate = parseInt(dt.getData('estimate')) || 120;
    if (!taskId) return;
    allocateTaskToSlot(taskId, dayIdx, dayDate, startStr, estimate);
  } else if (dtype === 'fixed-block' || dragData.type === 'fixed-block') {
    if (dragData.blockId) {
      moveFixedBlock(dragData.blockId, dayDate, startStr, dragData.duration || 60);
    }
  } else if (dtype === 'block-preset') {
    var name = dt.getData('blockName') || dragData.presetName || '';
    var dur = parseInt(dt.getData('blockDuration') || dragData.presetDuration) || 60;
    var btype = dt.getData('blockType') || dragData.presetType || 'other';
    if (name) createScheduleBlock(name, btype, dayDate, startStr, dur);
  } else if (dtype === 'personal-drag') {
    var title = dt.getData('personalTitle') || dragData.personalTitle || '';
    if (title) createScheduleBlock(title, 'other', dayDate, startStr, 60);
  }
  dragData = {};
}

async function allocateTaskToSlot(taskId, dayIdx, dayDate, startStr, estimatedMinutes) {
  var endMins = parseEstimate(startStr) + estimatedMinutes;
  var endStr = minsToTime(endMins);
  var r = await POST('/dashboard/schedule-blocks', {
    title: taskId,
    block_type: 'other',
    date: dayDate,
    start_time: startStr,
    end_time: endStr,
  });
  if (r) { loadAgenda(); showToast('Tarefa alocada', 'ok'); }
}

function parseEstimate(timeStr) {
  var parts = (timeStr || '08:00').split(':');
  return (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
}
function minsToTime(totalMins) {
  var h = Math.floor(totalMins / 60);
  var m = totalMins % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

async function moveFixedBlock(blockId, newDate, newStart, durationMins) {
  var endMins = parseEstimate(newStart) + durationMins;
  var r = await PUT('/dashboard/schedule-blocks/' + blockId, {
    date: newDate,
    start_time: newStart,
    end_time: minsToTime(endMins),
  });
  if (r && !r.error) loadAgenda();
}

async function createScheduleBlock(title, btype, dayDate, startStr, durationMins) {
  var endMins = parseEstimate(startStr) + durationMins;
  var r = await POST('/dashboard/schedule-blocks', {
    title: title,
    block_type: btype,
    date: dayDate,
    start_time: startStr,
    end_time: minsToTime(endMins),
  });
  if (r && !r.error) { loadAgenda(); showToast('Bloco criado', 'ok'); }
}

async function deleteScheduleBlock(blockId) {
  var r = await DEL('/dashboard/schedule-blocks/' + blockId);
  if (r && r.ok) { loadAgenda(); showToast('Bloco removido'); }
}

// Block resize
function startBlockResize(e, el, block, dayIdx, dayDate) {
  e.preventDefault();
  var startY = e.clientY;
  var startH = parseFloat(el.style.height) || 60;
  function onMove(ev) {
    var dy = ev.clientY - startY;
    var newH = Math.max(15, startH + dy);
    var snapH = Math.round(newH / (HOUR_H/4)) * (HOUR_H/4);
    el.style.height = snapH + 'px';
  }
  function onUp(ev) {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    var newH = parseFloat(el.style.height) || 60;
    var newDurMins = Math.round(newH / HOUR_H * 60);
    var startMins = parseEstimate(block.start);
    var newEnd = minsToTime(startMins + newDurMins);
    PUT('/dashboard/schedule-blocks/' + block.block_id, {end_time: newEnd}).then(function(r) {
      if (r && !r.error) loadAgenda();
    });
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// Slot popup (click empty slot)
function showSlotPopup(e, dayIdx, dayDate, startStr) {
  if (slotPopupEl) slotPopupEl.remove();
  var popup = document.createElement('div');
  popup.className = 'slot-popup';
  popup.style.left = (e.clientX - 20) + 'px';
  popup.style.top = (e.clientY - 10) + 'px';
  popup.style.position = 'fixed';
  slotPopupEl = popup;

  var selectedType = 'other';
  var types = [{emoji:'🍽',key:'meal'},{emoji:'🏃',key:'exercise'},{emoji:'🐕',key:'pet'},{emoji:'🏠',key:'home'},{emoji:'📝',key:'other'}];

  popup.innerHTML = '<input id="sp-name" placeholder="nome do bloco" style="width:100%;background:var(--bg);color:var(--t1);border:1px solid var(--b2);border-radius:4px;padding:5px 8px;font-size:12px;margin-bottom:6px;outline:none;font-family:inherit" />' +
    '<input id="sp-dur" placeholder="60" style="width:100%;background:var(--bg);color:var(--t1);border:1px solid var(--b2);border-radius:4px;padding:5px 8px;font-size:12px;margin-bottom:6px;outline:none;font-family:inherit" value="60" />' +
    '<div class="slot-popup-types" id="sp-types">' + types.map(function(t) {
      return '<button class="type-btn'+(t.key==='other'?' on':'')+'" data-k="'+t.key+'">'+t.emoji+'</button>';
    }).join('') + '</div>' +
    '<div class="slot-popup-actions"><button onclick="confirmSlotPopup(\''+dayDate+'\',\''+startStr+'\')">criar</button><button onclick="closeSlotPopup()">✕</button></div>';

  document.body.appendChild(popup);

  popup.querySelectorAll('.type-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      popup.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      selectedType = btn.dataset.k;
      popup._selectedType = selectedType;
    });
  });
  popup._selectedType = 'other';

  setTimeout(function() { var inp = document.getElementById('sp-name'); if(inp) inp.focus(); }, 50);
}

function confirmSlotPopup(dayDate, startStr) {
  var name = (document.getElementById('sp-name') || {}).value || '';
  var dur = parseInt((document.getElementById('sp-dur') || {}).value) || 60;
  var btype = (slotPopupEl && slotPopupEl._selectedType) || 'other';
  if (!name.trim()) { showToast('Digite um nome', 'err'); return; }
  createScheduleBlock(name.trim(), btype, dayDate, startStr, dur);
  closeSlotPopup();
}

function closeSlotPopup() {
  if (slotPopupEl) { slotPopupEl.remove(); slotPopupEl = null; }
}

function switchAsideTab(tab) {
  asideTab = tab;
  document.querySelectorAll('.aside-tab').forEach(function(el) {
    el.classList.toggle('on', el.dataset.stab === tab);
  });
  renderAsideTasks();
}

function renderAsideTasks() {
  var content = document.getElementById('aside-content');
  if (!content) return;

  if (asideTab === 'demandas') {
    renderAsideDemandas(content);
  } else if (asideTab === 'blocos') {
    renderAsideBlocos(content);
  } else if (asideTab === 'pessoal') {
    renderAsidePessoal(content);
  }
}

function renderAsideDemandas(content) {
  var tasks = [];
  if (allTasksCache) {
    tasks = (allTasksCache.active || []);
  } else if (stateData && stateData.activeQueue) {
    tasks = stateData.activeQueue;
  }
  var html = '<div class="aside-label">FILA DE PRIORIDADE</div>';
  html += '<div style="font-size:9px;color:var(--t3);font-family:monospace;padding:0 4px 8px">arrastar pra grade = fixar</div>';
  if (!tasks.length) { html += '<div style="padding:20px;text-align:center;color:var(--t3);font-size:11px;font-family:monospace">nenhuma demanda ativa</div>'; }
  tasks.forEach(function(t) {
    var pct = 0;
    if (t.checklistTotal > 0) pct = Math.round(t.checklistDone / t.checklistTotal * 100);
    var statusCls = t.status === 'active' ? 'qi-active' : (t.on_holding ? 'qi-holding' : 'qi-backlog');
    html += '<div class="queue-item" draggable="true" data-task-id="'+t.id+'" data-estimate="'+(t.estimated_minutes||t.estimate||120)+'" onclick="openTaskModal(\''+t.id+'\')">';
    html += '<div style="display:flex;align-items:center;gap:6px">';
    html += '<div class="qi-status '+statusCls+'"></div>';
    html += '<div class="qi-name">'+esc(t.taskName||t.title||'')+'</div>';
    html += '</div>';
    if (t.project) html += '<div class="qi-project">'+esc(t.project)+'</div>';
    html += '<div class="qi-meta">';
    if (t.estimated_minutes||t.estimate) html += '<span>'+(Math.round((t.estimated_minutes||t.estimate||0)/6)/10)+'h</span>';
    if (t.deadlineHuman && t.deadlineHuman !== 'sem prazo') html += '<span>📅 '+esc(t.deadlineHuman)+'</span>';
    html += '</div>';
    if (t.checklistTotal > 0) html += '<div class="qi-prog"><div class="qi-prog-fill" style="width:'+pct+'%"></div></div>';
    html += '</div>';
  });
  content.innerHTML = html;

  // Add drag events
  content.querySelectorAll('.queue-item').forEach(function(el) {
    el.addEventListener('dragstart', function(e) {
      dragData = {type:'task-drag', taskId:el.dataset.taskId, estimate:parseInt(el.dataset.estimate)||120};
      e.dataTransfer.setData('text/plain', 'task-drag');
      e.dataTransfer.setData('taskId', el.dataset.taskId);
      e.dataTransfer.setData('estimate', el.dataset.estimate);
      setTimeout(function(){el.style.opacity='0.4';},0);
    });
    el.addEventListener('dragend', function() { el.style.opacity='1'; });
  });
}

  content.innerHTML = html;

  content.querySelectorAll('.block-preset').forEach(function(el) {

async function loadDemandas() {
  var tree = await GET('/dashboard/projects');
  if (tree) { treeCache = tree; }
  var allTasks = await GET('/dashboard/all-tasks');
  if (allTasks) allTasksCache = allTasks;

function renderTree() {
  var container = document.getElementById('dem-tree');
  if (!container) return;
  var searchVal = (document.getElementById('dem-search') || {}).value || '';
  var nodes = treeCache || [];
  container.innerHTML = '';
  nodes.forEach(function(node) {
    var el = buildTreeNode(node, 0, searchVal);
    if (el) container.appendChild(el);
  });
}

function buildTreeNode(node, depth, search) {
  var status = node.status || 'active';
  if (demFilter !== 'all' && status !== demFilter && node.type !== 'project' && node.type !== 'deliverable' && node.type !== 'none') return null;
  var name = node.name || node.title || '';
  if (search && !name.toLowerCase().includes(search.toLowerCase())) {
    // Check children
    var hasMatch = false;
    (node.children || []).forEach(function(c) { if (buildTreeNode(c, depth+1, search)) hasMatch = true; });
    if (!hasMatch && node.type !== 'none') return null;
  }

  var wrap = document.createElement('div');
  wrap.className = 'tree-node';

  var row = document.createElement('div');
  row.className = 'tree-row';
  row.style.paddingLeft = (8 + depth * 20) + 'px';

  var hasChildren = (node.children || []).length > 0;

  if (hasChildren) {
    var toggle = document.createElement('span');
    toggle.className = 'tree-toggle';
    toggle.textContent = '▸';
    row.appendChild(toggle);
  } else {
    var spacer = document.createElement('span');
    spacer.style.cssText = 'width:16px;flex-shrink:0';
    row.appendChild(spacer);
  }

  // Status icon
  var icon = document.createElement('span');
  icon.className = 'tree-icon';
  if (node.type === 'project') icon.textContent = '▾';
  else if (node.type === 'deliverable') icon.textContent = '◈';
  else if (status === 'active' || status === 'pending' || status === 'in_progress') { icon.textContent = '●'; icon.className = 'tree-icon s-active'; }
  else if (status === 'on_holding') { icon.textContent = '◑'; icon.className = 'tree-icon s-holding'; }
  else if (status === 'backlog') { icon.textContent = '○'; icon.className = 'tree-icon s-backlog'; }
  else if (status === 'done') { icon.textContent = '✓'; icon.className = 'tree-icon s-done'; }
  row.appendChild(icon);

  var nameEl = document.createElement('span');
  nameEl.className = 'tree-name ' + (node.type || '');
  nameEl.textContent = node.taskName || name;
  row.appendChild(nameEl);

  if (node.type !== 'project' && node.type !== 'none' && node.type !== 'deliverable') {
    if (node.deadlineHuman && node.deadlineHuman !== 'sem prazo') {
      var dl = document.createElement('span');
      dl.className = 'tree-dl';
      dl.textContent = node.deadlineHuman;
      row.appendChild(dl);
    }
    if (node.estimated_minutes) {
      var est = document.createElement('span');
      est.className = 'tree-est';
      est.textContent = Math.round(node.estimated_minutes/60*10)/10 + 'h';
      row.appendChild(est);
    }
  }

  if (node.id) {
    row.style.cursor = 'pointer';
    row.addEventListener('click', function(e) {
      if (e.target === toggle) return;
      if (node.type !== 'project' && node.type !== 'deliverable' && node.type !== 'none') {
        openTaskModal(node.id);
      }
    });
  }

  wrap.appendChild(row);

  if (hasChildren) {
    var childrenEl = document.createElement('div');
    childrenEl.className = 'tree-children';
    childrenEl.style.display = (depth === 0 && node.type !== 'none') ? '' : 'none';
    (node.children || []).forEach(function(c) {
      var child = buildTreeNode(c, depth + 1, search);
      if (child) childrenEl.appendChild(child);
    });
    wrap.appendChild(childrenEl);

    if (toggle) {
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var isOpen = childrenEl.style.display !== 'none';
        childrenEl.style.display = isOpen ? 'none' : '';
        toggle.className = 'tree-toggle' + (isOpen ? '' : ' open');
      });
      // Open project-level by default
      if (depth === 0) { toggle.className = 'tree-toggle open'; }
    }
  }

  return wrap;
}

function filterTree() { renderTree(); }

function setDemFilter(filter, el) {
  demFilter = filter;
  document.querySelectorAll('.fchip').forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
  renderTree();
}

async function loadPersonal() {
  var items = await GET('/dashboard/personal-items');

function renderPersonalList(items) {
  var list = document.getElementById('pi-list');
  var doneList = document.getElementById('pi-done-list');
  if (!list) return;
  var search = (document.getElementById('pi-search') || {}).value || '';
  var pending = items.filter(function(i){ return !i.done && (!search || i.title.toLowerCase().includes(search.toLowerCase())); });
  var done = items.filter(function(i){ return i.done; });

  list.innerHTML = '';
  pending.forEach(function(item, idx) {
    list.appendChild(buildPersonalItem(item, idx, pending));
  });

  if (doneList) {
    doneList.innerHTML = '';
    done.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'pi-item';
      div.innerHTML = '<span class="pi-handle">⠿</span>' +
        '<input type="checkbox" class="pi-check" checked onchange="togglePersonalItem(\''+item.id+'\',false)">' +
        '<span class="pi-text done">'+esc(item.title)+'</span>' +
        '<span class="pi-del" onclick="deletePersonalItem(\''+item.id+'\')">✕</span>';
      doneList.appendChild(div);
    });
  }
}

function buildPersonalItem(item, idx, allPending) {
  var div = document.createElement('div');
  div.className = 'pi-item';
  div.draggable = true;
  div.dataset.id = item.id;
  div.dataset.pos = idx;

  var handle = document.createElement('span');
  handle.className = 'pi-handle';
  handle.textContent = '⠿';

  var check = document.createElement('input');
  check.type = 'checkbox';
  check.className = 'pi-check';
  check.checked = item.done;
  check.addEventListener('change', function() { togglePersonalItem(item.id, check.checked); });

  var text = document.createElement('span');
  text.className = 'pi-text';
  text.textContent = item.title;
  text.contentEditable = 'true';
  text.spellcheck = false;
  text.addEventListener('blur', function() {
    var newTitle = text.textContent.trim();
    if (newTitle && newTitle !== item.title) {
      PUT('/dashboard/personal-items/' + item.id, {title: newTitle}).then(function(){
        item.title = newTitle;
      });
    }
  });
  text.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); text.blur(); } });

  var del = document.createElement('span');
  del.className = 'pi-del';
  del.textContent = '✕';
  del.onclick = function() { deletePersonalItem(item.id); };

  div.appendChild(handle);
  div.appendChild(check);
  div.appendChild(text);
  div.appendChild(del);

  // Drag reorder
  div.addEventListener('dragstart', function(e) {
    e.dataTransfer.setData('text/plain', 'personal-reorder');
    e.dataTransfer.setData('personalId', item.id);
    div.classList.add('dragging');
  });
  div.addEventListener('dragend', function() { div.classList.remove('dragging'); });
  div.addEventListener('dragover', function(e) {
    e.preventDefault();
    div.classList.add('drag-over');
  });
  div.addEventListener('dragleave', function() { div.classList.remove('drag-over'); });
  div.addEventListener('drop', function(e) {
    e.preventDefault();
    div.classList.remove('drag-over');
    var srcId = e.dataTransfer.getData('personalId');
    if (!srcId || srcId === item.id) return;
    reorderPersonal(srcId, item.id);
  });

  return div;
}

async function reorderPersonal(srcId, targetId) {
  var src = personalCache.find(function(i){return i.id===srcId;});
  var tgt = personalCache.find(function(i){return i.id===targetId;});
  if (!src || !tgt) return;
  var srcPos = src.position;
  src.position = tgt.position;
  tgt.position = srcPos;
  var items = personalCache.map(function(i,idx){return {id:i.id, position:i.position};});
  await PUT('/dashboard/personal-items/reorder', {items: items});
  loadPersonal();
}

function parseEstimateStr(s) {
  if (!s || !s.trim()) return 120;
  s = s.trim().toLowerCase();
  var m = s.match(/^(\d+)h(\d+)/);
  if (m) return parseInt(m[1])*60 + parseInt(m[2]);
  m = s.match(/^(\d+)h/);
  if (m) return parseInt(m[1])*60;
  m = s.match(/^(\d+)min/);
  if (m) return parseInt(m[1]);
  m = s.match(/^(\d+)m/);
  if (m) return parseInt(m[1]);
  var n = parseInt(s);
  if (!isNaN(n)) return n > 24 ? n : n * 60;
  return 120;
}

function onQuickInput() {

async function doCreateTask(raw, dlInp, estInp, clearInp) {
  var parts = raw.split('|').map(function(s){return s.trim();});
  var project = parts.length > 1 ? parts[0] : '';
  var title = parts.length > 1 ? parts.slice(1).join(' | ').trim() : parts[0];
  var deadline = (dlInp && dlInp.value) ? dlInp.value + 'T18:00:00' : null;
  var estimate = estInp ? parseEstimateStr(estInp.value) : 120;

  var r = await POST('/dashboard/task/create-smart/confirm', {
    project: project,
    title: title,
    deadline: deadline,
    estimate: estimate,
    status: 'active',
    task_type: 'task',
  });
  if (r && r.status === 'ok') {
    showToast('✓ Tarefa criada', 'ok');
    if (clearInp) clearInp.value = '';
    if (dlInp) dlInp.value = '';
    if (estInp) estInp.value = '';
    var ac1 = document.getElementById('q-autocomplete');
    if (ac1) ac1.classList.remove('show');
    var ac2 = document.getElementById('qd-autocomplete');
    if (ac2) ac2.classList.remove('show');
    await loadProjectsCache();
    return true;
  }
  return false;
}
