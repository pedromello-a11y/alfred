async function openTaskModal(taskId) {
  currentModalTaskId = taskId;
  var overlay = document.getElementById('modal-overlay');
  var heading = document.getElementById('modal-heading');
  var body = document.getElementById('modal-body');
  if (!overlay) return;
  if (heading) heading.textContent = 'carregando…';
  if (body) body.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t3);font-family:monospace">carregando…</div>';
  overlay.classList.add('show');

  var task = await GET('/dashboard/task/' + taskId);
  if (!task || task.status === 'error') {
    if (body) body.innerHTML = '<div style="color:var(--red);padding:20px">Erro ao carregar tarefa</div>';
    return;
  }

  var title = task.taskName || task.fullTitle || '';
  if (heading) heading.textContent = title;

  var jiraKey = task.jira_key || '';
  var checklist = task.checklist || [];
  var notes = task.notes || [];

  var html = '';

  // Title editable
  html += '<div class="field-group" style="margin-bottom:14px">';
  html += '<label class="field-label">NOME</label>';
  html += '<input class="field-input" id="m-title" value="'+esc(title)+'" />';
  html += '</div>';

  // Status buttons
  html += '<div style="margin-bottom:14px">';
  html += '<label class="field-label">STATUS</label>';
  html += '<div class="status-btns" id="m-status-btns">';
  var statuses = [{k:'active',l:'ativa'},{k:'on_holding',l:'holding'},{k:'backlog',l:'backlog'},{k:'done',l:'concluída'}];
  statuses.forEach(function(s) {
    var cur = task.status || 'active';
    var on = (cur === s.k || (s.k === 'active' && (cur === 'pending' || cur === 'in_progress')));
    html += '<button class="sbtn'+(on?' on '+s.k:'')+'" onclick="setModalStatus(\''+s.k+'\')">'+s.l+'</button>';
  });
  html += '</div></div>';

  // Deadline + estimate
  html += '<div class="field-row">';
  html += '<div class="field-group"><label class="field-label">PRAZO</label>';
  var dlVal = task.deadline ? task.deadline.slice(0,10) : '';
  html += '<input class="field-input" id="m-deadline" type="date" value="'+dlVal+'" /></div>';
  html += '<div class="field-group"><label class="field-label">ESTIMATIVA</label>';
  var estH = task.estimatedMinutes ? Math.floor(task.estimatedMinutes/60) : 2;
  var estM = task.estimatedMinutes ? task.estimatedMinutes%60 : 0;
  var estStr = estH + 'h' + (estM ? String(estM).padStart(2,'0') : '');
  html += '<input class="field-input" id="m-estimate" value="'+estStr+'" placeholder="2h" />';
  html += '<div class="field-hint" id="m-est-hint">= '+task.estimatedMinutes+'min</div>';
  html += '</div></div>';

  // On Holding
  if (task.blocked || task.on_holding) {
    html += '<div class="holding-section">';
    html += '<div style="font-size:11px;font-weight:600;color:var(--warn);margin-bottom:6px;font-family:monospace">◑ ON HOLDING</div>';
    if (task.blocked_reason || task.holding_reason) {
      html += '<div style="font-size:12px;color:var(--t2)">'+esc(task.blocked_reason || task.holding_reason || '')+'</div>';
    }
    if (task.blocked_until || task.holding_until) {
      html += '<div style="font-size:11px;color:var(--t3);font-family:monospace;margin-top:4px">até: '+esc(String(task.blocked_until || task.holding_until || ''))+'</div>';
    }
    html += '<button class="btn" style="margin-top:8px;font-size:11px" onclick="unblockTask()">liberar</button>';
    html += '</div>';
  }

  // Jira
  if (jiraKey) {
    html += '<div style="margin-bottom:14px"><label class="field-label">JIRA</label><br>';
    html += '<span class="jira-badge">🔗 '+esc(jiraKey)+' ↗</span></div>';
  }

  // Checklist
  html += '<div style="margin-bottom:14px"><label class="field-label">CHECKLIST ('+checklist.filter(function(i){return i.done;}).length+'/'+checklist.length+')</label>';
  html += '<div id="m-checklist">';
  checklist.forEach(function(item, idx) {
    html += '<div class="cl-item"><input type="checkbox" id="mcl-'+idx+'" '+(item.done?'checked':'')+' onchange="toggleModalChecklist('+idx+',this.checked)">';
    html += '<label for="mcl-'+idx+'">'+esc(item.text)+'</label></div>';
  });
  html += '</div>';
  html += '<div class="cl-add"><input id="m-cl-new" placeholder="novo item…" onkeydown="if(event.key===\'Enter\')addModalChecklistItem()" /><button onclick="addModalChecklistItem()">+ add</button></div>';
  html += '</div>';

  // Notes
  html += '<div style="margin-bottom:14px"><label class="field-label">NOTAS</label>';
  html += '<div id="m-notes" style="margin-bottom:6px">';
  notes.forEach(function(n) {
    html += '<div style="padding:5px 0;border-bottom:1px solid var(--b1);font-size:12px;color:var(--t2)">'+esc(n.text)+'<span style="font-size:10px;color:var(--t3);font-family:monospace;margin-left:8px">'+esc(n.created_at||'')+'</span></div>';
  });
  html += '</div>';
  html += '<div class="cl-add"><input id="m-note-new" placeholder="adicionar nota…" onkeydown="if(event.key===\'Enter\')addModalNote()" /><button onclick="addModalNote()">+ add</button></div>';
  html += '</div>';

  // Footer
  html += '<div class="modal-footer">';
  html += '<button class="btn btn-green" onclick="saveModal()">salvar</button>';
  html += '<button class="btn btn-red" onclick="deleteModalTask()">🗑 excluir</button>';
  html += '</div>';

  if (body) body.innerHTML = html;

  // Auto-update estimate hint
  var estInput = document.getElementById('m-estimate');
  var estHint = document.getElementById('m-est-hint');
  if (estInput && estHint) {
    estInput.addEventListener('input', function() {
      var m = parseEstimateStr(estInput.value);
      estHint.textContent = '= ' + m + 'min';
    });
  }
}

function closeModal() {
  var overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.classList.remove('show');
  currentModalTaskId = null;
}

async function saveModal() {
  if (!currentModalTaskId) return;
  var title = (document.getElementById('m-title') || {}).value || '';
  var deadline = (document.getElementById('m-deadline') || {}).value || '';
  var estStr = (document.getElementById('m-estimate') || {}).value || '';
  var body = {};
  if (title) body.title = title;
  if (deadline) body.deadline = deadline + 'T18:00:00';
  if (estStr) body.estimated_minutes = parseEstimateStr(estStr);
  var r = await POST('/dashboard/task/' + currentModalTaskId + '/update', body);
  if (r && !r.error) {
    showToast('✓ Salvo', 'ok');
    closeModal();
    loadDemandas();
    stateData = null;
    GET('/dashboard/state').then(function(d){ if(d){stateData=d;renderFoco();} });
  }
}

async function setModalStatus(status) {
  if (!currentModalTaskId) return;
  document.querySelectorAll('#m-status-btns .sbtn').forEach(function(b){b.classList.remove('on','active','on_holding','backlog','done');});
  var clicked = document.querySelector('#m-status-btns .sbtn[onclick*="'+status+'"]');
  if (clicked) clicked.classList.add('on', status);
  await POST('/dashboard/task/' + currentModalTaskId + '/update', {status: status});
  if (status === 'done') {
    showToast('✓ Tarefa concluída', 'ok');
    closeModal();
    stateData = null;
    GET('/dashboard/state').then(function(d){ if(d){stateData=d;renderFoco();} });
  }
  loadDemandas();
}

async function unblockTask() {
  if (!currentModalTaskId) return;
  await POST('/dashboard/task/' + currentModalTaskId + '/unblock', {});
  closeModal();
  loadDemandas();
}

async function toggleModalChecklist(idx, done) {
  if (!currentModalTaskId) return;
  await POST('/dashboard/task/' + currentModalTaskId + '/checklist', {action:'toggle', index:idx});
}

async function addModalChecklistItem() {
  if (!currentModalTaskId) return;
  var inp = document.getElementById('m-cl-new');
  var text = inp ? inp.value.trim() : '';
  if (!text) return;
  await POST('/dashboard/task/' + currentModalTaskId + '/checklist', {action:'add', text:text});
  if (inp) inp.value = '';
  // Refresh checklist
  var task = await GET('/dashboard/task/' + currentModalTaskId);
  if (task) {
    var cl = document.getElementById('m-checklist');
    if (cl) {
      var html = '';
      (task.checklist || []).forEach(function(item,idx) {
        html += '<div class="cl-item"><input type="checkbox" id="mcl-'+idx+'" '+(item.done?'checked':'')+' onchange="toggleModalChecklist('+idx+',this.checked)">';
        html += '<label for="mcl-'+idx+'">'+esc(item.text)+'</label></div>';
      });
      cl.innerHTML = html;
    }
  }
}

async function addModalNote() {
  if (!currentModalTaskId) return;
  var inp = document.getElementById('m-note-new');
  var text = inp ? inp.value.trim() : '';
  if (!text) return;
  var r = await POST('/dashboard/task/' + currentModalTaskId + '/note', {text:text});
  if (r && r.status === 'ok') {
    if (inp) inp.value = '';
    var notesEl = document.getElementById('m-notes');
    if (notesEl && r.notes) {
      var html = '';
      r.notes.forEach(function(n) {
        html += '<div style="padding:5px 0;border-bottom:1px solid var(--b1);font-size:12px;color:var(--t2)">'+esc(n.text)+'<span style="font-size:10px;color:var(--t3);font-family:monospace;margin-left:8px">'+esc(n.created_at||'')+'</span></div>';
      });
      notesEl.innerHTML = html;
    }
  }
}

async function deleteModalTask() {
  if (!currentModalTaskId) return;
  if (!confirm('Excluir esta tarefa?')) return;
  await POST('/dashboard/task/' + currentModalTaskId + '/update', {status:'cancelled'});
  closeModal();
  loadDemandas();
  showToast('Tarefa cancelada');
}

// ─────────────────────────────────────────────
// CREATE MODAL
// ─────────────────────────────────────────────
function openCreateModal() {
  var overlay = document.getElementById('create-overlay');
  var body = document.getElementById('create-body');
  if (!overlay || !body) return;

  body.innerHTML = [
    '<div class="field-group" style="margin-bottom:14px">',
    '<label class="field-label">NOME</label>',
    '<input class="field-input" id="cm-name" placeholder="nome da tarefa" />',
    '</div>',
    '<div class="field-row">',
    '<div class="field-group"><label class="field-label">PROJETO</label>',
    '<div style="position:relative">',
    '<input class="field-input" id="cm-project" placeholder="opcional…" oninput="searchCmProject()" style="margin-bottom:0" />',
    '<div class="autocomplete" id="cm-proj-ac"></div>',
    '</div></div>',
    '<div class="field-group"><label class="field-label">TIPO</label>',
    '<select class="field-input" id="cm-type"><option value="task">tarefa</option><option value="deliverable">entrega</option><option value="project">projeto</option><option value="subtask">subtarefa</option></select>',
    '</div></div>',
    '<div class="field-row">',
    '<div class="field-group"><label class="field-label">STATUS</label>',
    '<select class="field-input" id="cm-status"><option value="active">ativa</option><option value="backlog">backlog</option><option value="on_holding">holding</option></select>',
    '</div>',
    '<div class="field-group"><label class="field-label">PRAZO</label>',
    '<input class="field-input" id="cm-deadline" type="date" />',
    '</div></div>',
    '<div class="field-group" style="margin-bottom:14px"><label class="field-label">ESTIMATIVA</label>',
    '<input class="field-input" id="cm-estimate" placeholder="2h" />',
    '<div class="field-hint" id="cm-est-hint">= 120min</div>',
    '</div>',
    '<div class="modal-footer">',
    '<button class="btn btn-green" onclick="submitCreate()">criar tarefa</button>',
    '<button class="btn" onclick="closeCreateModal()">cancelar</button>',
    '</div>',
  ].join('');

  overlay.classList.add('show');

  var estInp = document.getElementById('cm-estimate');
  var estHint = document.getElementById('cm-est-hint');
  if (estInp && estHint) {
    estInp.addEventListener('input', function() {
      estHint.textContent = '= ' + parseEstimateStr(estInp.value) + 'min';
    });
  }

  setTimeout(function() { var n = document.getElementById('cm-name'); if(n) n.focus(); }, 50);
}

function closeCreateModal() {
  var overlay = document.getElementById('create-overlay');
  if (overlay) overlay.classList.remove('show');
}

function searchCmProject() {
  var inp = document.getElementById('cm-project');
  var ac = document.getElementById('cm-proj-ac');
  if (!inp || !ac) return;
  var q = inp.value.trim();
  if (q.length < 1) { ac.classList.remove('show'); return; }
  var filtered = projectsCache.filter(function(p){ return p.name && p.name.toLowerCase().includes(q.toLowerCase()); }).slice(0,8);
  if (!filtered.length) { ac.classList.remove('show'); return; }
  ac.innerHTML = filtered.map(function(p){
    return '<div class="ac-item" onclick="pickCmProject(\''+esc(p.name)+'\')">'+esc(p.name)+'</div>';
  }).join('');
  ac.classList.add('show');
}

function pickCmProject(name) {
  var inp = document.getElementById('cm-project');
  if (inp) inp.value = name;
  var ac = document.getElementById('cm-proj-ac');
  if (ac) ac.classList.remove('show');
}

async function submitCreate() {
  var name = (document.getElementById('cm-name')||{}).value||'';
  var project = (document.getElementById('cm-project')||{}).value||'';
  var type = (document.getElementById('cm-type')||{}).value||'task';
  var status = (document.getElementById('cm-status')||{}).value||'active';
  var deadline = (document.getElementById('cm-deadline')||{}).value||'';
  var estStr = (document.getElementById('cm-estimate')||{}).value||'';
  if (!name.trim()) { showToast('Nome obrigatório', 'err'); return; }

  var r = await POST('/dashboard/task/create-smart/confirm', {
    project: project.trim(),
    title: name.trim(),
    deadline: deadline ? deadline + 'T18:00:00' : null,
    estimate: estStr ? parseEstimateStr(estStr) : 120,
    status: status,
    task_type: type,
  });
  if (r && r.status === 'ok') {
    showToast('✓ Tarefa criada', 'ok');
    closeCreateModal();
    loadDemandas();
    await loadProjectsCache();
  }
}

// ─────────────────────────────────────────────
// SEED
// ─────────────────────────────────────────────
async function seedDemo() {
  var r = await POST('/dashboard/seed-demo', {});
  if (r && r.ok) {
    showToast('Seed criado: ' + (r.message || ''), 'ok');
    loadAgenda();
    loadDemandas();
  }
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Close dropdowns on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('#q-input') && !e.target.closest('#q-autocomplete')) {
    var ac = document.getElementById('q-autocomplete');
    if (ac) ac.classList.remove('show');
  }
  if (!e.target.closest('#qd-input') && !e.target.closest('#qd-autocomplete')) {
    var ac = document.getElementById('qd-autocomplete');
    if (ac) ac.classList.remove('show');
  }
  if (!e.target.closest('#pause-btn') && !e.target.closest('#pause-menu')) {
    var pm = document.getElementById('pause-menu');
    if (pm) pm.style.display = 'none';
  }
  if (!e.target.closest('#cm-project') && !e.target.closest('#cm-proj-ac')) {
    var ac = document.getElementById('cm-proj-ac');
    if (ac) ac.classList.remove('show');
  }
  if (slotPopupEl && !slotPopupEl.contains(e.target)) {
    closeSlotPopup();
  }
});
</script>
