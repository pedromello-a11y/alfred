<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alfred</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@300;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:      #111113;
  --s1:      #18181b;
  --s2:      #1e1e22;
  --s3:      #242428;
  --b1:      #2a2a30;
  --b2:      #323238;
  --b3:      #3e3e46;

  --t-ghost: #1e1e24;
  --t-muted: #52525e;
  --t-dim:   #71717e;
  --t-mid:   #9898a8;
  --t-base:  #c4c4d0;
  --t-bright:#e2e2ec;
  --t-white: #f4f4f8;

  --pur:     #a855f7;
  --pur-hi:  #c084fc;
  --pur-dim: #6d28d9;
  --pur-bg:  #12071e;
  --pur-brd: #2d1256;

  --green:   #34d399;
  --greenbg: #061410;
  --greenbrd:#0d3528;

  --red:     #f87171;
  --redbg:   #160606;
  --redbrd:  #3d1212;

  --gold:    #fbbf24;
  --goldbg:  #140a00;
  --goldbrd: #3d2800;

  --gap:    1px;
  --row-h:  56px;
  --time-w: 46px;
}

html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Inter',sans-serif;color:var(--t-base)}

.root{
  display:grid;
  grid-template-columns:1fr 272px;
  grid-template-rows:1fr 1fr;
  width:100vw;height:100vh;
  gap:var(--gap);background:var(--b1);
}

/* ══ FOCO ══ */
.focus{
  grid-column:1;grid-row:1;
  background:var(--bg);
  display:flex;flex-direction:column;justify-content:center;
  padding:2.5rem 3.5rem;
  position:relative;overflow:hidden;
}

/* linha decorativa esquerda */
.focus::before{
  content:'';
  position:absolute;left:0;top:15%;bottom:15%;
  width:2px;background:var(--pur-dim);opacity:0.6;
}

.focus-ghost{
  position:absolute;right:-1rem;bottom:-1.5rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:15rem;font-weight:800;
  color:var(--t-ghost);line-height:1;
  letter-spacing:-0.04em;user-select:none;pointer-events:none;
}

.eyebrow{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--t-muted);margin-bottom:1.1rem;
  display:flex;align-items:center;gap:10px;
}
.blink{width:6px;height:6px;border-radius:50%;background:var(--pur);flex-shrink:0;animation:bk 2s ease-in-out infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0.15}}

.focus-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(2.8rem,5vw,5.2rem);
  font-weight:700;color:var(--t-white);
  line-height:0.95;letter-spacing:-0.02em;
  margin-bottom:.9rem;max-width:82%;text-transform:uppercase;
}

/* palavra de destaque em roxo */
.focus-title span{color:var(--pur-hi)}

.focus-meta{
  font-family:'DM Mono',monospace;
  font-size:11px;color:var(--t-muted);margin-bottom:2rem;letter-spacing:0.04em;
}

.focus-badge{
  display:inline-flex;align-items:center;gap:9px;
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--pur);border:0.5px solid var(--pur-brd);background:var(--pur-bg);
  padding:7px 16px;border-radius:4px;width:fit-content;
}

.next-strip{
  position:absolute;bottom:0;left:0;right:0;
  border-top:1px solid var(--b1);padding:.85rem 3.5rem;
  display:flex;align-items:center;gap:12px;background:var(--s1);
}
.next-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--t-muted);white-space:nowrap;flex-shrink:0}
.next-arrow{font-size:14px;color:var(--pur-dim);flex-shrink:0}
.next-name{
  font-size:13px;font-weight:500;
  color:var(--t-mid);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}
.next-note{font-family:'DM Mono',monospace;font-size:10px;color:var(--t-muted);white-space:nowrap;flex-shrink:0}

/* ══ AGENDA ══ */
.agenda{
  grid-column:1;grid-row:2;
  background:var(--s1);
  display:flex;flex-direction:column;
  overflow:hidden;border-top:1px solid var(--b1);
}
.agenda-header{
  display:grid;grid-template-columns:var(--time-w) repeat(5,1fr);
  border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--s1);
}
.agenda-spacer{border-right:1px solid var(--b1)}
.day-head{padding:6px 0 5px 10px;border-right:1px solid var(--b1)}
.day-head:last-child{border-right:none}
.dh-name{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--t-muted)}
.dh-num{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:300;color:var(--t-dim);margin-top:1px}
.dh-name.td{color:var(--pur)}
.dh-num.td{color:var(--pur-hi);font-weight:700}

.cal-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.cal-scroll::-webkit-scrollbar{width:3px}
.cal-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.cal-inner{display:grid;grid-template-columns:var(--time-w) repeat(5,1fr);position:relative}
.time-gutter{grid-column:1;position:relative}
.time-label{position:absolute;right:6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--t-muted);letter-spacing:0.04em;transform:translateY(-50%);white-space:nowrap}
.time-label.first{transform:translateY(0)}

.day-col{position:relative;border-left:1px solid var(--b1)}
.hour-line{position:absolute;left:0;right:0;border-top:1px solid var(--s3);pointer-events:none}

.ev{position:absolute;left:2px;right:2px;border-radius:4px;padding:3px 7px;overflow:hidden}
.ev-title{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.ev-time{font-family:'DM Mono',monospace;font-size:9px;opacity:0.65;margin-bottom:1px;line-height:1}
.ev-m{background:var(--pur-bg);color:var(--pur);border-left:2px solid var(--pur-dim)}
.ev-d{background:var(--redbg);color:var(--red);border-left:2px solid var(--redbrd)}
.ev-f{background:var(--greenbg);color:var(--green);border-left:2px solid var(--greenbrd)}
.ev-p{background:var(--s2);color:var(--t-muted);border-left:2px solid var(--b1)}

.now-line{position:absolute;right:0;height:1px;background:var(--pur);opacity:0.9;z-index:20;pointer-events:none}
.now-dot{position:absolute;left:-3px;top:-2.5px;width:5px;height:5px;border-radius:50%;background:var(--pur)}

/* ══ SIDEBAR ══ */
.sidebar{
  grid-column:2;grid-row:1/3;
  background:var(--s1);
  display:flex;flex-direction:column;
  border-left:1px solid var(--b1);overflow:hidden;
}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0}
.stab{
  flex:1;text-align:center;
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:0.16em;text-transform:uppercase;
  padding:10px 4px;color:var(--t-muted);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;
}
.stab.active{color:var(--pur-hi);border-bottom-color:var(--pur)}

.tab-pane{display:none;flex-direction:column;flex:1;overflow-y:auto}
.tab-pane::-webkit-scrollbar{width:2px}
.tab-pane::-webkit-scrollbar-thumb{background:var(--b2)}
.tab-pane.active{display:flex}

.sidebar-section{padding:.85rem 1rem;flex-shrink:0}
.sidebar-section+.sidebar-section{border-top:1px solid var(--b1)}
.sec-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--t-muted);margin-bottom:8px}

/* ══ TAREFAS ══ */
.task-list{display:flex;flex-direction:column}
.task-item{display:flex;flex-direction:column;border-bottom:1px solid var(--s3)}
.task-item:last-child{border-bottom:none}

.task-row{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 4px;border-radius:4px;cursor:pointer;
  transition:background .12s;
}
.task-row:hover{background:var(--s3)}

.tdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.tdot.hi{background:var(--pur)}
.tdot.md{background:var(--t-muted)}
.tdot.lo{background:var(--b3)}

.tname{font-size:12px;flex:1;line-height:1.35;color:var(--t-dim)}
.tname.cur{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--t-white);text-transform:uppercase;letter-spacing:0.02em;
}
.tname.hi{color:var(--t-bright);font-weight:500}

.tbdg{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;flex-shrink:0;margin-top:2px}
.bdg-a{background:var(--pur-bg);color:var(--pur);border:0.5px solid var(--pur-brd)}
.bdg-m{background:var(--s3);color:var(--t-muted);border:0.5px solid var(--b2)}

/* Painel inline */
.task-panel{
  display:none;flex-direction:column;gap:8px;
  padding:8px 4px 10px 13px;
  border-top:1px solid var(--s3);
  background:var(--bg);
  border-radius:0 0 4px 4px;
}
.task-panel.open{display:flex}

.panel-textarea{
  width:100%;background:var(--s2);
  border:0.5px solid var(--b2);border-radius:4px;
  color:var(--t-base);font-family:'Inter',sans-serif;font-size:11px;
  padding:6px 8px;resize:none;outline:none;line-height:1.5;
  transition:border-color .15s;
}
.panel-textarea:focus{border-color:var(--pur-dim)}
.panel-textarea::placeholder{color:var(--t-muted)}

.panel-date{
  background:var(--s2);border:0.5px solid var(--b2);border-radius:4px;
  color:var(--t-dim);font-family:'DM Mono',monospace;font-size:10px;
  padding:5px 8px;outline:none;width:100%;
}
.panel-date:focus{border-color:var(--pur-dim)}

.panel-actions{display:flex;gap:5px;flex-wrap:wrap}
.btn{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:5px 10px;border-radius:4px;cursor:pointer;
  border:0.5px solid;transition:opacity .15s;
}
.btn:hover{opacity:0.7}
.btn-done{color:var(--green);border-color:var(--greenbrd);background:var(--greenbg)}
.btn-send{color:var(--pur-hi);border-color:var(--pur-brd);background:var(--pur-bg)}
.btn-date{color:var(--gold);border-color:var(--goldbrd);background:var(--goldbg)}
.btn-del{color:var(--red);border-color:var(--redbrd);background:var(--redbg)}
.btn-cancel{color:var(--t-muted);border-color:var(--b2);background:transparent}

.panel-feedback{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--green);letter-spacing:0.1em;display:none;
}

/* ══ XP + Clock ══ */
.xp-strip{padding:.8rem 1rem;border-top:1px solid var(--b1);flex-shrink:0}
.xp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.xp-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--t-dim)}
.xp-pct{font-family:'DM Mono',monospace;font-size:10px;color:var(--pur)}
.xp-bg{height:2px;background:var(--b2);border-radius:1px;margin-bottom:10px}
.xp-fill{height:100%;background:var(--pur-dim);border-radius:1px}
.streak-row{display:flex;align-items:center;justify-content:space-between}
.sdots{display:flex;gap:4px}
.sd{width:6px;height:6px;border-radius:50%}
.sd.on{background:var(--pur-dim)}
.sd.off{background:var(--b2)}
.slbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--t-muted)}

.clock-strip{
  padding:.8rem 1rem;border-top:1px solid var(--b1);flex-shrink:0;
  display:flex;align-items:baseline;gap:10px;
}
.clock-time{
  font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;
  font-weight:300;color:var(--t-mid);
  letter-spacing:-0.01em;font-variant-numeric:tabular-nums;
}
.clock-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--t-muted);letter-spacing:.06em}
</style>
</head>
<body>
<div class="root">

  <!-- FOCO -->
  <div class="focus">
    <span class="focus-ghost">01</span>
    <div class="eyebrow"><span class="blink"></span>foco agora</div>
    <div class="focus-title" id="focus-title"><span id="focus-project">Spark</span> | <span id="focus-task">Motion Avisos</span></div>
    <div class="focus-meta" id="focus-meta">Spark · ~3h estimadas · prazo: esta semana</div>
    <div class="focus-badge">não mude de tarefa sem concluir isso</div>
    <div class="next-strip">
      <span class="next-lbl">próximo</span>
      <span class="next-arrow">→</span>
      <span class="next-name" id="next-name">Vídeo de Abertura / FIRE</span>
      <span class="next-note" id="next-note">reunião 3K — seg 11h</span>
    </div>
  </div>

  <!-- AGENDA -->
  <div class="agenda">
    <div class="agenda-header">
      <div class="agenda-spacer"></div>
      <div class="day-head" id="dh0"></div>
      <div class="day-head" id="dh1"></div>
      <div class="day-head" id="dh2"></div>
      <div class="day-head" id="dh3"></div>
      <div class="day-head" id="dh4"></div>
    </div>
    <div class="cal-scroll">
      <div class="cal-inner" id="cal-inner"></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="stab active" onclick="sw('hotmart',this)">hotmart</div>
      <div class="stab" onclick="sw('pessoal',this)">pessoal</div>
    </div>

    <div class="tab-pane active" id="pane-hotmart">
      <div class="sidebar-section">
        <div class="sec-label">hoje</div>
        <div class="task-list" id="list-hoje-hotmart"></div>
      </div>
      <div class="sidebar-section">
        <div class="sec-label">backlog</div>
        <div class="task-list" id="list-backlog-hotmart"></div>
      </div>
    </div>

    <div class="tab-pane" id="pane-pessoal">
      <div class="sidebar-section">
        <div class="sec-label">hoje</div>
        <div class="task-list" id="list-hoje-pessoal"></div>
      </div>
      <div class="sidebar-section">
        <div class="sec-label">backlog</div>
        <div class="task-list" id="list-backlog-pessoal"></div>
      </div>
    </div>

    <div class="xp-strip">
      <div class="xp-row"><span class="xp-lbl" id="xp-lbl">nível 4 · 620xp</span><span class="xp-pct" id="xp-pct">62%</span></div>
      <div class="xp-bg"><div class="xp-fill" id="xp-fill" style="width:62%"></div></div>
      <div class="streak-row">
        <span class="slbl">sequência</span>
        <div class="sdots" id="sdots">
          <span class="sd on"></span><span class="sd on"></span><span class="sd on"></span>
          <span class="sd on"></span><span class="sd on"></span>
          <span class="sd off"></span><span class="sd off"></span>
        </div>
        <span class="slbl" id="streak-lbl">5 dias</span>
      </div>
    </div>

    <div class="clock-strip">
      <div class="clock-time" id="clock">--:--</div>
      <div class="clock-date" id="dateval">—</div>
    </div>
  </div>

</div>
<script>
var API_BASE=window.location.hostname==='localhost'||window.location.protocol==='file:'
  ?'http://localhost:8000'
  :'';

var openPanel=null;

async function sendToAlfred(id,action,note,date){
  try{
    var resp=await fetch(API_BASE+'/dashboard/action',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({task_id:id,action:action,note:note||null,date:date||null})
    });
    if(!resp.ok)throw new Error('HTTP '+resp.status);
  }catch(e){
    console.error('→ Alfred action failed:',e);
  }
}

function buildPanel(item,panelEl){
  var today=new Date().toISOString().split('T')[0];
  panelEl.innerHTML=
    '<textarea class="panel-textarea" rows="2" placeholder="anotação rápida…" id="note-'+item.id+'"></textarea>'+
    '<input type="date" class="panel-date" value="'+today+'" id="date-'+item.id+'">'+
    '<div class="panel-actions">'+
      '<div class="btn btn-done"   onclick="act(\''+item.id+'\',\'concluida\')">✓ concluída</div>'+
      '<div class="btn btn-send"   onclick="act(\''+item.id+'\',\'nota\')">↑ nota</div>'+
      '<div class="btn btn-date"   onclick="act(\''+item.id+'\',\'data\')">⊙ data</div>'+
      '<div class="btn btn-del"    onclick="act(\''+item.id+'\',\'excluir\')">⌫ excluir</div>'+
      '<div class="btn btn-cancel" onclick="closePanel()">✕</div>'+
    '</div>'+
    '<div class="panel-feedback" id="fb-'+item.id+'"></div>';
}

function act(id,action){
  var note=(document.getElementById('note-'+id)||{}).value||'';
  var date=(document.getElementById('date-'+id)||{}).value||'';
  sendToAlfred(id,action,note,date);
  var fb=document.getElementById('fb-'+id);
  if(fb){
    fb.textContent={concluida:'concluída ✓',nota:'nota enviada ✓',data:'data atualizada ✓',excluir:'excluída ✓'}[action]||'enviado ✓';
    fb.style.display='block';
    setTimeout(closePanel,1400);
  }
}

function closePanel(){
  if(openPanel){openPanel.classList.remove('open');openPanel=null;}
}

function togglePanel(item,panelEl){
  if(openPanel&&openPanel!==panelEl){openPanel.classList.remove('open');openPanel=null;}
  if(panelEl.classList.contains('open')){panelEl.classList.remove('open');openPanel=null;}
  else{buildPanel(item,panelEl);panelEl.classList.add('open');openPanel=panelEl;}
}

function renderList(id,items){
  var c=document.getElementById(id);if(!c)return;
  c.innerHTML='';
  items.forEach(function(item){
    var wrap=document.createElement('div');wrap.className='task-item';
    var row=document.createElement('div');row.className='task-row';
    row.innerHTML=
      '<span class="tdot '+item.dot+'"></span>'+
      '<span class="tname '+item.cls+'">'+item.name+'</span>'+
      (item.badge?'<span class="tbdg '+item.bdgcls+'">'+item.badge+'</span>':'');
    var panel=document.createElement('div');panel.className='task-panel';
    row.addEventListener('click',function(){togglePanel(item,panel);});
    wrap.appendChild(row);wrap.appendChild(panel);c.appendChild(wrap);
  });
}

/* ── Agenda ── */
var CAL_START=9,CAL_END=19,ROW_H=56;
var HOURS=[];for(var h=CAL_START;h<=CAL_END;h++)HOURS.push(h);
var N_HOURS=CAL_END-CAL_START;
var DAY_NAMES=['seg','ter','qua','qui','sex'];
var MONTHS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
var DAYS_PT=['dom','seg','ter','qua','qui','sex','sáb'];
var EVENTS={};
function timeToPx(t){var p=t.split(':');return(parseInt(p[0])+parseInt(p[1])/60-CAL_START)*ROW_H}
function getMonday(d){var m=new Date(d);m.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1));return m}

function buildCalendar(){
  var now=new Date();
  var dow=now.getDay();
  var todayIdx=(dow===0)?6:dow-1;
  var mon=getMonday(now);
  var totalH=N_HOURS*ROW_H;

  for(var i=0;i<5;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);
    var isT=(i===todayIdx);
    var dh=document.getElementById('dh'+i);
    dh.innerHTML='<div class="dh-name'+(isT?' td':'')+'">'+DAY_NAMES[i]+'</div><div class="dh-num'+(isT?' td':'')+'">'+d.getDate()+'</div>';
  }

  var inner=document.getElementById('cal-inner');
  inner.style.height=totalH+'px';
  inner.style.position='relative';

  var gutter=document.createElement('div');
  gutter.className='time-gutter';
  gutter.style.cssText='grid-column:1;position:relative;';
  HOURS.forEach(function(hr,idx){
    var lbl=document.createElement('div');
    lbl.className='time-label'+(idx===0?' first':'');
    lbl.style.top=(idx*ROW_H)+'px';
    lbl.textContent=hr+'h';
    gutter.appendChild(lbl);
  });
  inner.appendChild(gutter);

  for(var di=0;di<5;di++){
    var col=document.createElement('div');
    col.className='day-col';
    col.style.cssText='grid-column:'+(di+2)+';position:relative;';
    for(var li=0;li<=N_HOURS;li++){
      var line=document.createElement('div');line.className='hour-line';
      line.style.top=(li*ROW_H)+'px';col.appendChild(line);
    }
    (EVENTS[di]||[]).forEach(function(ev){
      var top=timeToPx(ev.time);var ht=Math.max(timeToPx(ev.end)-top-2,18);
      var el=document.createElement('div');el.className='ev '+ev.type;
      el.style.cssText='top:'+top+'px;height:'+ht+'px;';
      el.innerHTML='<div class="ev-time">'+ev.time+'</div><div class="ev-title">'+ev.title+'</div>';
      col.appendChild(el);
    });
    inner.appendChild(col);
  }

  /* Linha do agora — atravessa toda a grade */
  var nowH=now.getHours()+now.getMinutes()/60;
  if(nowH>=CAL_START&&nowH<=CAL_END){
    var nowPx=timeToPx(now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'));
    var nl=document.createElement('div');nl.className='now-line';
    nl.style.cssText='top:'+nowPx+'px;left:var(--time-w);right:0;';
    nl.innerHTML='<div class="now-dot"></div>';
    inner.appendChild(nl);
  }

  document.querySelector('.cal-scroll').scrollTop=Math.max(0,(nowH-CAL_START-1)*ROW_H);
}

function updateClock(){
  var n=new Date();
  document.getElementById('clock').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  document.getElementById('dateval').textContent=DAYS_PT[n.getDay()]+' · '+n.getDate()+' '+MONTHS[n.getMonth()];
}

function sw(tab,el){
  el.parentElement.querySelectorAll('.stab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  document.getElementById('pane-hotmart').classList.toggle('active',tab==='hotmart');
  document.getElementById('pane-pessoal').classList.toggle('active',tab==='pessoal');
}

/* ── Live data ── */
function applyState(s){
  /* Focus */
  var parts=s.focus.title.split('|');
  document.getElementById('focus-project').textContent=parts[0].trim();
  document.getElementById('focus-task').textContent=(parts[1]||'').trim()||s.focus.title;
  document.getElementById('focus-meta').textContent=
    s.focus.project+' · '+s.focus.estimate+' estimadas · prazo: '+s.focus.deadline;

  /* Next */
  document.getElementById('next-name').textContent=s.next.title||'—';
  document.getElementById('next-note').textContent=s.next.note||'';

  /* Tasks — map API dto to renderList format */
  function toRenderItem(t){
    var bdgcls=t.priority==='hi'?'bdg-a':'bdg-m';
    return {id:t.id,name:t.name,cls:t.cls||'',badge:t.badge,bdgcls:bdgcls,dot:t.priority};
  }
  var hoje=(s.tasks.hoje||[]).map(toRenderItem);
  var backlog=(s.tasks.backlog||[]).map(toRenderItem);
  renderList('list-hoje-hotmart',   hoje.length?hoje:[{id:'__none',name:'nenhum item',cls:'',badge:'',bdgcls:'',dot:'lo'}]);
  renderList('list-backlog-hotmart',backlog.length?backlog:[{id:'__none',name:'nenhum item',cls:'',badge:'',bdgcls:'',dot:'lo'}]);
  renderList('list-hoje-pessoal',   [{id:'__none',name:'nenhum item',cls:'',badge:'',bdgcls:'',dot:'lo'}]);
  renderList('list-backlog-pessoal',[{id:'__none',name:'nenhum item registrado',cls:'',badge:'',bdgcls:'',dot:'lo'}]);

  /* Agenda */
  EVENTS={};
  (s.agenda||[]).forEach(function(d){
    EVENTS[d.day]=(d.events||[]).map(function(e){
      var typeMap={meeting:'ev-m',deadline:'ev-d',focus:'ev-f'};
      return {title:e.title,time:e.time,end:e.end,type:typeMap[e.type]||'ev-p'};
    });
  });

  /* XP */
  var xp=s.xp||{};
  document.getElementById('xp-lbl').textContent='nível '+(xp.level||1)+' · '+(xp.current||0)+'xp';
  document.getElementById('xp-pct').textContent=(xp.percent||0)+'%';
  document.getElementById('xp-fill').style.width=(xp.percent||0)+'%';
  var streak=xp.streak||0;
  document.getElementById('streak-lbl').textContent=streak+' dias';
  var dots=document.getElementById('sdots');
  dots.innerHTML='';
  for(var i=0;i<7;i++){
    var sp=document.createElement('span');sp.className='sd '+(i<streak?'on':'off');dots.appendChild(sp);
  }
}

async function loadState(){
  try{
    var resp=await fetch(API_BASE+'/dashboard/state');
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    var data=await resp.json();
    applyState(data);
    rebuildCalendar();
  }catch(e){
    console.error('Alfred state fetch failed:',e);
  }
}

function rebuildCalendar(){
  var inner=document.getElementById('cal-inner');
  inner.innerHTML='';
  buildCalendar();
}

buildCalendar();
updateClock();
setInterval(updateClock,15000);
loadState();
setInterval(loadState,60000);
</script>
</body>
