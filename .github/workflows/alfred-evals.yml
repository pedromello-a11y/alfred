name: Alfred evals

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  regressions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alfred regression evals
        run: pytest tests/alfred_eval -q
