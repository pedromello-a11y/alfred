name: Alfred evals

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  regressions:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alfred_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d alfred_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/alfred_test
      ANTHROPIC_API_KEY: test-key
      JIRA_BASE_URL: https://example.atlassian.net
      JIRA_EMAIL: test@example.com
      JIRA_API_TOKEN: test-token
      GOOGLE_REFRESH_TOKEN: test-refresh
      GOOGLE_CLIENT_ID: test-client-id
      GOOGLE_CLIENT_SECRET: test-client-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alfred regression evals
        id: pytest
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: |
          pytest tests/alfred_eval -q --junitxml=pytest-report.xml 2>&1 | tee pytest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Build failure report
        if: always()
        run: |
          python scripts/collect_failures.py \
            --junitxml pytest-report.xml \
            --output failure_report.json \
            --stdout pytest-output.txt \
            --repo "$GITHUB_REPOSITORY"

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alfred-eval-report
          path: |
            failure_report.json
            pytest-report.xml
            pytest-output.txt
          retention-days: 7

      - name: Fail job if tests failed
        if: steps.pytest.outcome != 'success'
        run: exit 1
